<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accedi · 148 Roster</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>

<main class="container" style="max-width:460px;padding-top:40px">
  <h1 class="title" style="text-align:center">Accedi</h1>

  <!-- LOGIN -->
  <form class="panel" id="formLogin" onsubmit="return doLogin(event)">
    <div class="field"><label>Email</label><input type="email" id="li_email" required></div>
    <div class="field"><label>Password</label><input type="password" id="li_pass" required></div>
    <button class="btn primary" style="width:100%">Accedi</button>
    <div class="hint" style="margin-top:10px;text-align:center">
      <a href="#recupera" onclick="tab('recupera');return false">Password dimenticata?</a>
    </div>
  </form>

  <!-- RECUPERO PASSWORD -->
  <form class="panel" id="formRecupera" style="display:none" onsubmit="return doForgot(event)">
    <p class="sub" style="margin-top:0">Inserisci la tua email: ti invieremo un link per reimpostare la password.</p>
    <div class="field"><label>Email</label><input type="email" id="fp_email" required></div>
    <button class="btn primary" style="width:100%">Invia link di recupero</button>
    <div class="hint" style="margin-top:10px;text-align:center">
      <a href="#login" onclick="tab('login');return false">← Torna al login</a>
    </div>
  </form>

  <!-- VERIFICA EMAIL (post registrazione / login non verificato) -->
  <div class="panel" id="formVerify" style="display:none;text-align:center">
    <div style="font-size:44px;line-height:1">📧</div>
    <h3 style="margin:10px 0 4px">Verifica la tua email</h3>
    <p class="sub" style="margin-top:0">Ti abbiamo inviato un link a <b id="vf_email"></b>.<br>Cliccalo per attivare l'account.<br><span style="color:var(--muted);font-size:13px">Controlla anche lo spam.</span></p>
    <button class="btn ghost" style="width:100%" onclick="doResend()">Reinvia email di verifica</button>
    <div class="hint" style="margin-top:10px;text-align:center"><a href="#login" onclick="tab('login');return false">← Torna al login</a></div>
  </div>

  <div class="hint" style="margin-top:14px;text-align:center" id="regHint">Non hai un account? <a href="/registrati.html">Registrati</a></div>
</main>

<script src="/assets/api.js"></script>
<script>
renderNav();
let pendingEmail = '';
function tab(t){
  document.getElementById('formLogin').style.display    = t==='login'?'':'none';
  document.getElementById('formRecupera').style.display = t==='recupera'?'':'none';
  document.getElementById('formVerify').style.display   = 'none';
  document.getElementById('regHint').style.display = t==='login'||t==='recupera' ? '' : 'none';
}
function showVerify(email){
  pendingEmail = email;
  document.getElementById('vf_email').textContent = email;
  ['formLogin','formRecupera'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('regHint').style.display = 'none';
  document.getElementById('formVerify').style.display = '';
}
async function doResend(){
  try { await api('resend-verification.php',{method:'POST',body:{email:pendingEmail}}); toast('Email di verifica reinviata ✉️'); }
  catch(err){ toast(errMsg(err), true); }
}
if (location.hash === '#recupera') tab('recupera');
if (new URLSearchParams(location.search).get('verify') === 'fail') toast('Link di verifica non valido o scaduto. Accedi per reinviarlo.', true);
async function doForgot(e){ e.preventDefault();
  try {
    await api('password-forgot.php',{method:'POST',body:{email:fp_email.value}});
    toast('Se l\'email è registrata, riceverai il link tra poco.');
    setTimeout(()=>tab('login'), 800);
  } catch(err){ toast(errMsg(err), true); }
  return false;
}
async function doLogin(e){ e.preventDefault();
  try {
    const u = await api('login.php',{method:'POST',body:{email:li_email.value,password:li_pass.value}});
    location.href = u.user.role==='artist' ? '/profilo.html'
      : u.user.role==='management' ? '/management.html'
      : '/cerca.html';
  } catch(err){
    if (err.message === 'email_not_verified'){ showVerify(err.data?.email || li_email.value); return false; }
    toast(errMsg(err), true);
  }
  return false;
}
</script>
</body>
</html>
