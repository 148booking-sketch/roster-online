<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Account · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;max-width:900px}
@media(max-width:960px){.acc-grid{grid-template-columns:1fr}}
.acc-card{background:#fff;border:1px solid var(--line2);border-radius:16px;padding:20px}
.acc-card h3{font:600 15px var(--f-display);margin:0 0 6px;display:flex;align-items:center;gap:8px}
.acc-card .csub{font-size:12.5px;color:var(--muted);margin:0 0 16px}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<div id="pageContent" style="display:none">
  <div class="pmain-pad" id="pagePad">
    <h1 class="ptitle">Account</h1>
    <p class="psub">I tuoi dati e la sicurezza dell'accesso.</p>

    <div class="acc-grid">
      <form class="acc-card" onsubmit="return saveAccount(event)">
        <h3 data-ic="user" data-ic-size="16">Dati account</h3>
        <p class="csub">Chi sei e come accedi.</p>
        <div class="field"><label id="ac_nameLbl">Nome visualizzato</label><input id="ac_name" required></div>
        <div class="field"><label>Email</label><input id="ac_email" type="email" required>
          <div class="hint">Se la cambi dovrai verificare il nuovo indirizzo.</div></div>
        <div id="orgFields" style="display:none">
          <div style="height:1px;background:var(--line2);margin:4px 0 16px"></div>
          <div class="row">
            <div class="field" style="max-width:200px"><label>Tipo</label>
              <select id="pp_tipo">
                <option value="locale">Locale</option><option value="festival">Festival</option>
                <option value="associazione">Associazione</option><option value="agenzia">Agenzia</option>
                <option value="booking">Booking</option>
                <option value="management">Management</option>
                <option value="privato">Privato</option><option value="altro">Altro</option>
              </select>
            </div>
            <div class="field"><label>Telefono</label><input id="pp_phone" placeholder="+39..."></div>
          </div>
          <div class="row">
            <div class="autocomplete field"><label>Comune</label><input id="pp_comune" placeholder="Es. Roma"></div>
            <div class="field" style="max-width:110px"><label>Prov.</label><input id="pp_prov" maxlength="2" placeholder="RM"></div>
          </div>
          <div class="field"><label>Sito web o altro link</label><input id="pp_web" placeholder="https://..."></div>
        </div>
        <button class="btn primary sm">Salva dati</button>
      </form>

      <form class="acc-card" onsubmit="return changePass(event)">
        <h3 data-ic="lock" data-ic-size="16">Password</h3>
        <p class="csub">Minimo 8 caratteri.</p>
        <div class="field"><label>Password attuale</label><input id="pw_cur" type="password" autocomplete="current-password" required></div>
        <div class="field"><label>Nuova password</label><input id="pw_new" type="password" minlength="8" required></div>
        <div class="field"><label>Ripeti nuova password</label><input id="pw_new2" type="password" minlength="8" required></div>
        <button class="btn primary sm">Cambia password</button>
      </form>
    </div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
(async function init(){
  const me = await getMe(true);
  if (!me.user){ location.href = '/accedi.html'; return; }
  if (me.user.role === 'artist'){ location.href = '/profilo.html'; return; }
  if (['promoter','management'].includes(me.user.role)) mountPromoterShell(me.user,'account');
  else { await renderNav(); document.getElementById('pageContent').style.display=''; document.getElementById('pagePad').classList.remove('pmain-pad'); document.getElementById('pagePad').classList.add('container','section'); }
  injectIcons();
  ac_name.value  = me.user.display_name || '';
  ac_email.value = me.user.email || '';
  if (['promoter','management'].includes(me.user.role)) {
    document.getElementById('ac_nameLbl').textContent = me.user.role==='management' ? 'Nome agenzia' : 'Nome locale / festival / promoter';
    initPromoterProfile(me.profile || {});
  }
})();

function initPromoterProfile(p){
  document.getElementById('orgFields').style.display = '';
  pp_tipo.value  = p.tipo || 'locale';
  pp_phone.value = p.phone || '';
  pp_comune.value = p.comune || '';
  pp_prov.value   = p.provincia || '';
  pp_web.value    = p.website || '';
  comuniAutocomplete(pp_comune, (n, pr) => pp_prov.value = pr);
}
async function saveAccount(e){ e.preventDefault();
  const btn = e.target.querySelector('button'), oldLabel = btn.textContent;
  btn.disabled = true; btn.textContent = 'Salvataggio…';
  try {
    const r = await api('account-save.php',{method:'POST',body:{
      display_name: ac_name.value, email: ac_email.value }});
    // se i campi organizzazione sono visibili (promoter/agenzia), salva anche quelli
    if (document.getElementById('orgFields').style.display !== 'none') {
      await api('promoter-profile-save.php',{method:'POST',body:{
        org_name: ac_name.value, tipo: pp_tipo.value, phone: pp_phone.value,
        comune: pp_comune.value, provincia: pp_prov.value, website: pp_web.value }});
    }
    _me = null;
    toast(r.email_changed
      ? 'Email aggiornata: controlla la nuova casella e verifica per poter riaccedere.'
      : 'Dati salvati ✓');
  } catch(err){ toast(errMsg(err), true); }
  finally { btn.disabled = false; btn.textContent = oldLabel; }
  return false;
}
async function changePass(e){ e.preventDefault();
  if (pw_new.value !== pw_new2.value){ toast('Le due password non coincidono', true); return false; }
  if (!pw_cur.value){ toast('Inserisci la password attuale', true); return false; }
  const btn = e.target.querySelector('button'), oldLabel = btn.textContent;
  btn.disabled = true; btn.textContent = 'Salvataggio…';
  try {
    await api('password-change.php',{method:'POST',body:{ current_password: pw_cur.value, new_password: pw_new.value }});
    toast('Password aggiornata ✓');
    pw_cur.value = pw_new.value = pw_new2.value = '';
  } catch(err){ toast(errMsg(err), true); }
  finally { btn.disabled = false; btn.textContent = oldLabel; }
  return false;
}
</script>
</body>
</html>
