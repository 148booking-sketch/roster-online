<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Artista · Booking Roster</title>
<meta name="description" content="Profilo artista su Booking Roster">
<link rel="stylesheet" href="/assets/style.css">
<style>
.listing{max-width:var(--maxw);margin:0 auto;padding:24px 26px 60px}
.crumb{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.crumb a{color:var(--muted)}
.crumb .sep{margin:0 6px}
.crumb b{color:var(--txt);font-weight:600}
.hero{display:grid;grid-template-columns:380px 1fr;gap:28px;align-items:stretch}
.photo{border-radius:18px;overflow:hidden;background:var(--panel2);position:relative;height:100%;min-height:380px}
/* mobile DOPO la regola base, altrimenti min-height:380 vince e con aspect-ratio 1/1 la foto sborda dal container */
@media(max-width:860px){.hero{grid-template-columns:1fr}.photo{width:100%;height:auto;min-height:0;aspect-ratio:1/1}}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.photo .ph-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#c9c9c9}
.photo .verif{position:absolute;bottom:12px;left:12px;border:0;box-shadow:0 1px 4px rgba(0,0,0,.18);font-size:11px;padding:3px 9px}
.promo-pin{position:absolute;top:14px;right:14px;background:#c0395e;color:#fff;font-size:12px;font-weight:800;padding:6px 12px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.h1{font-family:var(--f-display);font-size:30px;font-weight:700;letter-spacing:-.6px;margin:0;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.h1 .vchk{width:18px;height:18px;font-size:9px}
.subline{font-size:14.5px;color:var(--muted);margin-top:4px}
.gchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.gchip{font:600 12.5px var(--f-body);color:#444;background:#f2f2f2;border-radius:20px;padding:6px 12px;text-decoration:none}
.gchip:hover{background:#eaeaea}
.statrow{display:flex;gap:22px;margin-top:20px;padding:16px 0;border-top:1px solid var(--line2);border-bottom:1px solid var(--line2);flex-wrap:wrap}
.statrow .n{font:700 19px var(--f-display)}
.statrow .l{font-size:11.5px;color:var(--muted)}
.bookbox{margin-top:20px;border:1px solid var(--line2);border-radius:16px;padding:20px;box-shadow:0 6px 20px rgba(0,0,0,.06)}
.bb-price{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.bb-price .amount{font:700 24px var(--f-display)}
.bb-price .meta{font-size:13.5px;color:var(--muted)}
.bb-cta{width:100%;margin-top:14px;font-size:15px;border-radius:11px;padding:14px;justify-content:center}
.bb-row2{display:flex;gap:10px;margin-top:10px}
.bb-row2 .btn{flex:1;justify-content:center;border-radius:10px;padding:11px;font-size:13.5px}
.bb-note{font-size:12.5px;color:var(--muted);text-align:center;margin-top:10px}
.secT{font:700 17px var(--f-display);margin:0 0 8px}
.bio-det{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:28px;align-items:start}
@media(max-width:860px){.bio-det{grid-template-columns:1fr}}
.bio-sec{min-width:0}
.bio-sec p{font-size:14.5px;line-height:1.6;color:#444;margin:0;white-space:pre-line}
.mediagrid{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.mediagrid{grid-template-columns:1fr}}
.mediabox{border:1px solid var(--line2);border-radius:14px;overflow:hidden;min-height:170px}
.mediabox iframe{display:block;width:100%;height:100%;min-height:352px;border:0}
.detgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.det{border:1px solid var(--line2);border-radius:12px;padding:13px 15px}
.det.wide{grid-column:1/-1}
.det .l{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#9a9aa2}
.det .v{font-size:14.5px;font-weight:600;margin-top:3px}
.det .tags{margin-top:6px}
.gal-head{display:flex;align-items:center;gap:9px;margin:28px 0 12px}
.gal-ic{width:26px;height:26px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;flex:none}
.gal-h{font:700 16px var(--f-display)}
.gal-sub{font-size:12.5px;color:var(--muted)}
.ig-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.ig-grid{grid-template-columns:repeat(2,1fr)}}
.ig-grid a{aspect-ratio:1/1;border-radius:12px;overflow:hidden;display:block;background:var(--panel2)}
.ig-grid img{width:100%;height:100%;object-fit:cover;display:block}
.tk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:640px){.tk-grid{grid-template-columns:repeat(2,1fr)}}
.tk-grid a{aspect-ratio:9/16;border-radius:12px;overflow:hidden;display:block;background:var(--panel2);position:relative}
.tk-grid img{width:100%;height:100%;object-fit:cover;display:block}
.tk-grid .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;filter:drop-shadow(0 1px 4px rgba(0,0,0,.4))}
/* modale richiesta (12a) */
.reqmodal .mhead{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line2)}
.reqmodal .rm-ava{width:40px;height:40px;border-radius:50%;overflow:hidden;flex:none;background:var(--panel2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.reqmodal .rm-ava img{width:100%;height:100%;object-fit:cover}
.reqmodal .rm-t{font:700 16px var(--f-display);display:flex;align-items:center;gap:6px}
.reqmodal .rm-s{font-size:12px;color:var(--muted)}
.reqmodal .mbody{padding:20px}
.reqmodal .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px}
@media(max-width:560px){.reqmodal .grid2{grid-template-columns:1fr}}
.avail{display:flex;align-items:center;gap:8px;margin-top:12px;padding:11px 13px;border-radius:10px;font-size:12.5px}
.avail.free{background:#f1fbf5;border:1px solid #cbead6;color:#0a7d38}
.avail.busy{background:#fbeaef;border:1px solid #f3d3dd;color:#c0395e}
.reqmodal .mfoot{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--line2)}
/* mini calendario nella modale richiesta */
.rqcal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rqcal-nav b{font:700 14px var(--f-display);text-transform:capitalize}
.rqcal-nav button{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.rqcal-nav button:disabled{opacity:.35;cursor:default}
.rqcal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.rqcal-head span{text-align:center;font:700 10px var(--f-body);color:#9a9aa2}
.rqcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.rqd{aspect-ratio:1/1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:1px solid #f0f0f0;cursor:pointer}
.rqd.blank{border:0;cursor:default}
.rqd.past{color:#c9c9c9;cursor:default;background:#fafafa;border-color:#fafafa}
.rqd.busy{background:#fbeaef;border-color:#f3d3dd;color:#c0395e;cursor:default;text-decoration:line-through}
.rqd.free:hover{border-color:var(--brand)}
.rqd.sel{background:var(--brand);border-color:var(--brand);color:#fff}
.reqmodal .mfoot .send{flex:1;justify-content:center;border-radius:10px}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<main class="listing" id="main"><div class="empty">Caricamento…</div></main>

<!-- MODALE RICHIESTA (design 12a) -->
<div class="overlay" id="reqModal">
  <div class="modal reqmodal" style="max-width:520px;padding:0">
    <div class="mhead">
      <span class="rm-ava" id="rm_ava"></span>
      <div><div class="rm-t" id="rm_title"></div><div class="rm-s" id="rm_sub"></div></div>
      <button type="button" class="iconbtn" style="margin-left:auto" onclick="closeReq()">✕</button>
    </div>
    <div class="mbody">
      <div class="field" style="margin:0 0 4px"><label>Data evento *</label></div>
      <div class="rqcal-nav">
        <button type="button" id="rqPrev" onclick="rqNav(-1)">‹</button>
        <b id="rqCalTitle"></b>
        <button type="button" onclick="rqNav(1)">›</button>
      </div>
      <div class="rqcal-head"><span>L</span><span>M</span><span>M</span><span>G</span><span>V</span><span>S</span><span>D</span></div>
      <div class="rqcal-grid" id="rqCalGrid"></div>
      <div class="avail" id="rq_avail" style="display:none"></div>
      <div class="grid2" style="margin-top:14px">
        <div class="field" style="margin:0"><label>Link evento</label><input type="url" id="rq_link" placeholder="https://… (pagina o locandina)"></div>
        <div class="autocomplete field" style="margin:0"><label>Comune *</label><input id="rq_comune" placeholder="Es. Milano" autocomplete="off" required></div>
      </div>
      <div class="field" style="margin:14px 0 0"><label>Messaggio *</label><textarea id="rq_msg" placeholder="Racconta l'evento, il locale, gli orari…" style="min-height:76px"></textarea></div>
    </div>
    <div class="mfoot">
      <button type="button" class="btn ghost" onclick="closeReq()">Annulla</button>
      <button type="button" class="btn primary send" onclick="sendReq()">Invia richiesta</button>
    </div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
let A=null, ME=null, busySet=new Set();
const slug=(new URLSearchParams(location.search)).get('slug')||location.pathname.replace(/^\/|\/$/g,'');

function socialIcon(k,href,color){
  const p=SOCIAL_SVG[k]; if(!p) return '';
  return `<a href="${esc(href)}" target="_blank" rel="noopener" title="${SM[k]?SM[k][0]:esc(k)}" style="display:inline-flex;color:${color||'#555'}">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="display:block">${p}</svg></a>`;
}
function spotifyId(a){ const m=((a.socials||{}).spotify||'').match(/\/artist\/([A-Za-z0-9]+)/); return m?m[1]:''; }

/* prezzo grande nel booking box */
function priceBig(a){
  if(a.locked) return {amount:icon('lock',20,1.9)+' Riservato', meta:a.pending_verification?'account in attesa di verifica':'visibile ai promoter registrati'};
  const v=a.cachet_min ?? a.cachet_max;
  if(v==null) return {amount:'Trattativa riservata', meta:''};
  if(v===0)  return {amount:'Senza impegno', meta:'disponibile anche a rimborso spese'};
  const tratt=a.cachet_trattabile==1?' · trattabile':'';
  if(a.has_promo && a.cachet_promo!=null)
    return {amount:`<s style="color:var(--muted);font-weight:400;font-size:17px">${eur(v)}</s> <span style="color:#c0395e">${eur(a.cachet_promo)}</span>`,
            meta:'a serata'+tratt+(a.promo_until?` · PROMO fino al ${new Date(a.promo_until.replace(' ','T')).toLocaleDateString('it-IT')}`:' · PROMO')};
  return {amount:'da '+eur(v), meta:'a serata'+tratt};
}
function rimborsoLabel(a){ switch(a.rimborso_tipo){
  case'incluso':return'Inclusi nel cachet';
  case'forfait':return a.rimborso_forfait!=null?('Forfait '+eur(a.rimborso_forfait)):'Forfait';
  case null: case undefined: return ''; default:return'Da concordare'; } }

/* statistiche principali in riga (design 5b) */
function statRow(a){
  const s=a.stats||{};
  const seen=new Set();
  const items=[['spotify_listeners','Spotify'],['spotify_followers','Spotify'],['instagram_followers','Instagram'],
    ['youtube_subs','YouTube'],['tiktok_followers','TikTok'],['facebook_followers','Facebook'],['twitch_followers','Twitch']]
    .filter(([k,l])=>{ if(s[k]==null||s[k]<=0||seen.has(l)) return false; seen.add(l); return true; }).slice(0,4);
  if(!items.length) return '';
  return `<div class="statrow">${items.map(([k,l])=>`<div><div class="n">${fmt(s[k])}</div><div class="l">${l}</div></div>`).join('')}</div>`;
}

async function init(){
  await renderNav();
  ME=(await getMe()).user;
  try{ A=(await api('artist-get.php?slug='+encodeURIComponent(slug))).artist; }
  catch(e){ document.getElementById('main').innerHTML=`<div class="empty">Artista non trovato.<br><a class="btn ghost sm" style="margin-top:14px" href="/">Torna alla ricerca</a></div>`; return; }
  document.title=(A.stage_name||'Artista')+' · Booking Roster';
  busySet=new Set(A.calendar_busy||[]);
  render();
}

function render(){
  const a=A;
  const socials=Object.entries(a.socials||{}).filter(([k,v])=>v&&SM[k]);
  const genres=(a.genres||[]).map(g=>`<a class="gchip" href="/genere/${esc(g.slug)}">${esc(g.name)}</a>`).join('');
  const spId=spotifyId(a);
  const ytId=(a.stats||{}).youtube_video||'';
  const p=priceBig(a);
  const photo=a.photo_url
    ? `<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer" alt="">`
    : `<div class="ph-fallback">${icon('music',54,1.2)}</div>`;

  // CTA del booking box in base a chi guarda
  let cta='';
  if(a.can_contact && ME && ME.role!=='artist' && ME.role!=='admin'){
    cta=`<button class="btn primary bb-cta" onclick="openReq()">${icon('inbox',17,1.9)} Richiedi questo artista</button>`;
  } else if(!ME){
    cta=`<a class="btn primary bb-cta" href="/accedi.html">Accedi per contattare</a>`;
  } else if(ME.role==='artist' && ME.id!==a.user_id){
    cta=`<a class="btn ghost bb-cta" href="/registrati-promoter.html">Registrati come promoter per contattare</a>`;
  }
  const favBtn = a.can_favorite
    ? `<button class="btn ghost favsave${a.is_favorite?' on':''}" id="bb_fav" onclick="toggleFavPage()">${icon('heart',15,1.8)} ${a.is_favorite?'Salvato':'Salva'}</button>`
    : '';
  const row2 = (favBtn||true) ? `<div class="bb-row2">${favBtn}<button class="btn ghost" onclick="sharePage()">${icon('arrowRight',15,1.8)} Condividi</button></div>` : '';

  // dettagli booking (viaggi, durata, on stage, raggio, label, agenzia, backline, scheda tecnica)
  const det=[];
  if(!a.locked && rimborsoLabel(a)) det.push(['Spese di viaggio', esc(rimborsoLabel(a))]);
  det.push(['Disponibilità', a.travel_max_km ? ('entro '+a.travel_max_km+' km') : 'In tutta Italia']);
  if(a.durata_set_min) det.push(['Durata set', a.durata_set_min+' min']);
  if(a.componenti)     det.push(['On stage', a.componenti+(a.componenti>1?' componenti':' componente')]);
  if(a.label)      det.push(['Label', esc(a.label)]);
  if(a.management) det.push(['Agenzia', esc(a.management)]);
  if(!a.locked && a.tech_sheet_url) det.push(['Scheda tecnica', `<a href="${esc(a.tech_sheet_url)}" target="_blank" rel="noopener" style="color:var(--brand2);font-weight:600">Apri documento →</a>`]);
  if(a.locked) det.push(['Scheda tecnica', icon('lock',13)+' riservata ai promoter']);
  if((a.gear_bring||[]).length) det.push(["Cosa porta l'artista", `<div class="tags">${a.gear_bring.map(g=>`<span class="tag">${esc(g)}</span>`).join('')}</div>`, 'wide']);
  if((a.gear_need||[]).length)  det.push(['Cosa serve sul posto', `<div class="tags">${a.gear_need.map(g=>`<span class="tag">${esc(g)}</span>`).join('')}</div>`, 'wide']);

  // gallerie
  const igPhotos=((a.stats||{}).instagram_photos||[]).slice(0,4);
  const igHandle=((a.socials||{}).instagram||'').replace(/^.*instagram\.com\//,'').replace(/\/.*$/,'').replace(/^@/,'');
  const v=encodeURIComponent(a.stats_updated_at||'');
  const igSec = igPhotos.length && (a.socials||{}).instagram ? `
    <div class="gal-head"><span class="gal-ic" style="background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af)">${icon('grid',14,1.9)}</span>
      <div class="gal-h">Foto da Instagram</div><span class="gal-sub">${igHandle?'@'+esc(igHandle):''}</span></div>
    <div class="ig-grid">${igPhotos.map((u,i)=>`<a href="${esc(socialHref('instagram',a.socials.instagram))}" target="_blank" rel="noopener">
      <img src="/api/ig-photo.php?u=${a.user_id}&i=${i}&v=${v}" loading="lazy" alt="" onerror="this.closest('a').style.display='none'"></a>`).join('')}</div>`:'';

  const tkIds=((a.stats||{}).tiktok_videos||[]).slice(0,4);
  const tkHandle=(((a.socials||{}).tiktok||'').match(/tiktok\.com\/@?([\w.]+)/)||[,((a.socials||{}).tiktok||'').replace(/^@/,'')])[1]||'';
  const tkSec = tkIds.length && (a.socials||{}).tiktok ? `
    <div class="gal-head"><span class="gal-ic" style="background:#111"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">${SOCIAL_SVG.tiktok}</svg></span>
      <div class="gal-h">Video da TikTok</div><span class="gal-sub">@${esc(tkHandle)}</span></div>
    <div class="tk-grid">${tkIds.map((id,i)=>`<a href="https://www.tiktok.com/@${esc(tkHandle)}/video/${esc(id)}" target="_blank" rel="noopener">
      <img src="/api/tiktok-photo.php?u=${a.user_id}&i=${i}&v=${v}" loading="lazy" alt="" onerror="this.closest('a').style.display='none'">
      <span class="play">${icon('play',30,1)}</span></a>`).join('')}</div>`:'';

  const spEmbed = spId ? gatedEmbed(`<iframe src="https://open.spotify.com/embed/artist/${spId}?utm_source=generator"
      allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>`,'Spotify') : '';
  const ytEmbed = ytId ? gatedEmbed(`<iframe src="https://www.youtube.com/embed/${esc(ytId)}"
      frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe>`,'YouTube') : '';
  const twId=(a.stats||{}).twitch_video||'';
  const twEmbed = twId ? gatedEmbed(`<iframe src="https://player.twitch.tv/?video=${esc(twId)}&parent=${location.hostname}&autoplay=false"
      frameborder="0" allowfullscreen loading="lazy"></iframe>`,'Twitch') : '';
  const media=[spEmbed,ytEmbed,twEmbed].filter(Boolean);

  document.getElementById('main').innerHTML=`
    <div class="crumb"><a href="/">Cerca artisti</a><span class="sep">›</span><b>${esc(a.stage_name||'Artista')}</b></div>
    <div class="hero">
      <div class="photo">
        ${photo}
        ${a.verified?`<span class="verif"><span class="tick">✓</span>Artista verificato</span>`:''}
        ${a.has_promo?'<span class="promo-pin">PROMO</span>':''}
      </div>
      <div>
        <h1 class="h1">${esc(a.stage_name||'Senza nome')}${a.verified?'<span class="vchk">✓</span>':''}</h1>
        <div class="subline">${[showLabel(a.formazione), a.comune?(esc(a.comune)+(a.provincia?' ('+esc(a.provincia)+')':'')):''].filter(Boolean).join(' · ')}</div>
        ${genres?`<div class="gchips">${genres}</div>`:''}
        <div style="display:flex;gap:14px;margin-top:14px;align-items:center">
          ${socials.map(([k,v])=>socialIcon(k,socialHref(k,v),SM[k]&&SM[k][1])).join('')}
          ${a.website?socialIcon('website',a.website,'#555'):''}
        </div>
        ${statRow(a)}
        <div class="bookbox">
          <div class="bb-price"><div class="amount">${p.amount}</div>${p.meta?`<div class="meta">${p.meta}</div>`:''}</div>
          ${cta}
          ${row2}
        </div>
      </div>
    </div>

    ${(a.bio||det.length)?`<div class="bio-det">
      ${a.bio?`<div class="bio-sec"><div class="secT">Chi è ${esc(a.stage_name||'')}</div><p>${esc(a.bio)}</p></div>`:'<div></div>'}
      ${det.length?`<div><div class="secT">Dettagli per il booking</div>
        <div class="detgrid">${det.map(([l,v,w])=>`<div class="det${w?' wide':''}"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('')}</div></div>`:''}
    </div>`:''}
    ${media.length?`<div class="mediagrid">${media.map(m=>`<div class="mediabox">${m}</div>`).join('')}</div>`:''}
    ${igSec}
    ${tkSec}`;
}

/* ---- Salva nei preferiti (bottone nel booking box) ---- */
async function toggleFavPage(){
  const btn=document.getElementById('bb_fav');
  const on=!btn.classList.contains('on');
  try{
    const r=await api('favorites-toggle.php',{method:'POST',body:{artist_user_id:A.user_id,on}});
    btn.classList.toggle('on',r.favorite);
    btn.innerHTML=icon('heart',15,1.8)+' '+(r.favorite?'Salvato':'Salva');
    toast(r.favorite?'Aggiunto ai preferiti ♥':'Rimosso dai preferiti');
  }catch(err){ toast(errMsg(err),true); }
}
async function sharePage(){
  const url=location.href;
  if(navigator.share){ try{ await navigator.share({title:document.title,url}); }catch(e){} return; }
  try{ await navigator.clipboard.writeText(url); toast('Link copiato ✓'); }catch(e){ toast(url); }
}

/* ---- Modale richiesta (12a) ---- */
const RQ_MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
let rqY, rqM, selectedDate=null;
function openReq(){
  const m=document.getElementById('reqModal');
  rm_ava.innerHTML = A.photo_url?`<img src="${esc(A.photo_url)}" referrerpolicy="no-referrer">`:esc(avatarInitials(A.stage_name));
  if(!A.photo_url) rm_ava.style.background=avatarColor(A.stage_name);
  rm_title.innerHTML = 'Richiedi '+esc(A.stage_name)+(A.verified?'<span class="vchk">✓</span>':'');
  const v=A.cachet_min??A.cachet_max;
  rm_sub.textContent = [showLabel(A.formazione), (!A.locked&&v)?('da '+eur(A.has_promo&&A.cachet_promo!=null?A.cachet_promo:v)+' a serata'):''].filter(Boolean).join(' · ');
  if(!window._rqAc){ window._rqAc=1; comuniAutocomplete(document.getElementById('rq_comune'), ()=>{}); }
  const t=new Date(); rqY=t.getFullYear(); rqM=t.getMonth();
  selectedDate=null; updateAvail();
  drawReqCal();
  m.classList.add('open');
}
function closeReq(){ document.getElementById('reqModal').classList.remove('open'); }
function rqNav(d){ rqM+=d; if(rqM<0){rqM=11;rqY--} if(rqM>11){rqM=0;rqY++} drawReqCal(); }
function rqPick(iso){ selectedDate = selectedDate===iso?null:iso; drawReqCal(); updateAvail(); }
function drawReqCal(){
  const t=new Date(); t.setHours(0,0,0,0);
  document.getElementById('rqPrev').disabled = (new Date(rqY,rqM,1) <= new Date(t.getFullYear(),t.getMonth(),1));
  document.getElementById('rqCalTitle').textContent = RQ_MESI[rqM]+' '+rqY;
  const startDow=(new Date(rqY,rqM,1).getDay()+6)%7;
  const days=new Date(rqY,rqM+1,0).getDate();
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="rqd blank"></div>';
  for(let d=1;d<=days;d++){
    const date=new Date(rqY,rqM,d);
    const iso=date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
    const busy=A.has_calendar && busySet.has(iso);
    if(date<t)      cells+=`<div class="rqd past">${d}</div>`;
    else if(busy)   cells+=`<div class="rqd busy" title="Occupato">${d}</div>`;
    else            cells+=`<div class="rqd free${selectedDate===iso?' sel':''}" onclick="rqPick('${iso}')">${d}</div>`;
  }
  document.getElementById('rqCalGrid').innerHTML=cells;
}
function updateAvail(){
  const el=document.getElementById('rq_avail');
  if(!selectedDate){ el.style.display='none'; return; }
  const dd=new Date(selectedDate+'T00:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  el.className='avail free';
  el.innerHTML = icon('check',15,2)+` Data scelta: <b style="margin:0 3px">${dd}</b>`+(A.has_calendar?" · l'artista risulta libero":'');
  el.style.display='';
}
async function sendReq(){
  const me=await getMe();
  if(!me.user){ location.href='/accedi.html'; return; }
  if(!['promoter','management'].includes(me.user.role)){ toast('Solo promoter e agenzie possono inviare richieste',true); return; }
  const date=selectedDate;
  const msg=(document.getElementById('rq_msg').value||'').trim();
  if(!date){ toast('Seleziona una data dal calendario',true); return; }
  if(!msg){ toast('Scrivi un messaggio',true); return; }
  try{
    if(!(document.getElementById('rq_comune').value||'').trim()){ toast('Indica il comune dell\'evento',true); return false; }
    await api('booking-request.php',{method:'POST',body:{artist_user_id:A.user_id, event_date:date, message:msg,
      event_link:(document.getElementById('rq_link').value||'').trim()||null,
      comune:(document.getElementById('rq_comune').value||'').trim()||null}});
    toast('Richiesta inviata!');
    closeReq();
    document.getElementById('rq_msg').value=''; document.getElementById('rq_link').value=''; document.getElementById('rq_comune').value='';
  }catch(err){ toast(errMsg(err),true); }
}
init();
</script>
