<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendario artisti · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
/* design 11b: matrice disponibilità — righe artisti, colonne prossimi giorni */
.avz{max-width:var(--maxw);margin:0 auto;padding:22px 26px 60px}
.avz-head{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.avz-head h1{font:700 20px var(--f-display);letter-spacing:-.4px;margin:0}
.avz-nav{margin-left:auto;display:flex;align-items:center;gap:10px;font:600 13px var(--f-body)}
.avz-nav .lbl{color:var(--muted);text-transform:capitalize}
.avz-nav button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.avz-nav button:hover:not(:disabled){background:var(--panel2)}
.avz-nav button:disabled{opacity:.35;cursor:default}
.avz-legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-bottom:14px}
.avz-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
.avz-box{background:#fff;border:1px solid var(--line2);border-radius:16px;padding:16px 18px;overflow-x:auto}
.avz-grid{display:grid;grid-template-columns:230px repeat(10,minmax(52px,1fr));gap:6px;align-items:center;min-width:820px}
.avz-dow{text-align:center;font:700 11px var(--f-body);color:#9a9aa2}
.avz-dow b{display:block;color:#222;font-size:13px}
.avz-dow.today b{color:var(--brand)}
.avz-artist{display:flex;align-items:center;gap:9px;min-width:0;cursor:pointer}
.avz-artist:hover .nm{text-decoration:underline}
.avz-ava{width:32px;height:32px;border-radius:50%;overflow:hidden;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex:none}
.avz-ava img{width:100%;height:100%;object-fit:cover}
.avz-artist .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avz-artist .mt{font-size:11px;color:var(--muted)}
.avz-cell{height:26px;border-radius:6px;background:#eafaf0;cursor:pointer}
.avz-cell.busy{background:#fbeaef}
.avz-cell:hover{outline:2px solid var(--brand);outline-offset:-1px}
.avz-sep{grid-column:1/-1;height:1px;background:#f2f2f2}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<div class="avz">
  <div class="avz-head">
    <h1>Disponibilità artisti</h1>
    <div class="avz-nav">
      <span class="lbl" id="avzLbl"></span>
      <button id="avzPrev" onclick="nav(-10)">‹</button>
      <button onclick="nav(10)">›</button>
    </div>
  </div>
  <div class="avz-legend">
    <span><i style="background:#eafaf0;border:1px solid #bfe9cf"></i>Libero</span>
    <span><i style="background:#fbeaef;border:1px solid #f3d3dd"></i>Occupato</span>
  </div>
  <div class="avz-box"><div class="avz-grid" id="avzGrid"></div></div>
  <div id="calEmpty" class="empty" style="display:none"><span class="et">Nessun calendario collegato</span>Gli artisti con Google Calendar collegato appariranno qui.</div>
</div>

<script src="/assets/api.js"></script>
<script>
const MESI=['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
const GG=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
let ART=[], OFFSET=0;   // OFFSET = giorni da oggi all'inizio della finestra (finestre da 10 giorni)

function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function goArtist(slug){ if(slug) location.href='/'+slug; }
function nav(delta){ OFFSET=Math.max(0, OFFSET+delta); draw(); }

function draw(){
  document.getElementById('avzPrev').disabled = OFFSET===0;
  const days=[]; const base=new Date(); base.setHours(0,0,0,0); base.setDate(base.getDate()+OFFSET);
  for(let i=0;i<10;i++){ const d=new Date(base); d.setDate(base.getDate()+i); days.push(d); }
  const todayIso=isoOf(new Date());
  document.getElementById('avzLbl').textContent =
    `${days[0].getDate()} ${MESI[days[0].getMonth()]} – ${days[9].getDate()} ${MESI[days[9].getMonth()]} ${days[9].getFullYear()}`;

  let html='<div></div>'+days.map(d=>{
    const iso=isoOf(d);
    return `<div class="avz-dow${iso===todayIso?' today':''}">${GG[d.getDay()]}<b>${d.getDate()}</b></div>`;
  }).join('');

  ART.forEach((a,ri)=>{
    const busy=a._busy;
    const pic=a.photo_url?`<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer" alt="">`:esc(avatarInitials(a.stage_name||'A'));
    html+='<div class="avz-sep"></div>';
    html+=`<div class="avz-artist" onclick="goArtist('${esc(a.slug||'')}')" title="Vedi profilo">
      <span class="avz-ava" style="background:${avatarColor(a.stage_name||'A')}">${pic}</span>
      <span style="min-width:0"><span class="nm" style="display:block">${esc(a.stage_name||'Artista')}${a.verified?'<span class="vchk">✓</span>':''}</span><span class="mt">${esc(a.comune||'')}</span></span>
    </div>`;
    html+=days.map(d=>{
      const iso=isoOf(d);
      const b=busy.has(iso);
      return `<div class="avz-cell${b?' busy':''}" title="${esc(a.stage_name||'')} · ${d.getDate()} ${MESI[d.getMonth()]} · ${b?'occupato':'libero'}" onclick="goArtist('${esc(a.slug||'')}')"></div>`;
    }).join('');
  });

  document.getElementById('avzGrid').innerHTML=html;
}

async function init(){
  await renderNav();
  let data=[];
  try{ data=(await api('calendars-busy.php')).artists||[]; }catch(e){ toast('Errore caricamento calendario',true); }
  ART=data.map(a=>({...a, _busy:new Set(a.busy||[])}));
  // prima gli artisti con più giorni liberi nei prossimi 10 giorni
  document.getElementById('calEmpty').style.display = ART.length ? 'none' : '';
  document.querySelector('.avz-box').style.display = ART.length ? '' : 'none';
  draw();
}
init();
</script>
</body>
</html>
