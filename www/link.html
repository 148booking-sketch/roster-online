<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Link · 148 Roster</title>
<meta name="description" content="Tutti i link e il booking in un unico posto.">
<link rel="stylesheet" href="/assets/style.css">
<style>
body{background:var(--panel2)}
.biocard{max-width:460px;margin:0 auto;padding:36px 20px 48px}
.bio-avatar{width:104px;height:104px;border-radius:50%;overflow:hidden;margin:0 auto 14px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:38px}
.bio-avatar img{width:100%;height:100%;object-fit:cover}
.bio-name{font-family:var(--f-display);font-size:24px;font-weight:700;text-align:center;margin:0 0 4px}
.vchk{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:#1d9bf0;color:#fff;font-size:10px;font-weight:900;flex:none;vertical-align:middle}
.bio-box{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:#fff;margin:0 0 14px}
.bio-box p{margin:0;color:#333;font-size:14px;line-height:1.6;white-space:pre-line}
.bio-box:not(.open) p{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.bio-box .more{display:none;margin-top:8px;font-size:13px;font-weight:700;color:var(--brand)}
.bio-box.clampable{cursor:pointer}
.bio-infogrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 0 14px}
.ig-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff}
.ig-card.full{grid-column:1/-1}
.ig-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:6px}
.ig-value{font-family:var(--f-display);font-weight:700;font-size:16px}
.ig-card .tags{margin-top:2px}
.bio-release{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;margin:0 0 14px}
.bio-release-top{display:flex;gap:12px;align-items:center}
.bio-release-cover{width:64px;height:64px;border-radius:10px;flex:none;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.bio-release-cover img{width:100%;height:100%;object-fit:cover}
.bio-release-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.bio-release-title{font-weight:700;font-size:15px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bio-release-sub{font-size:13px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bio-release-links{display:flex;gap:10px;margin-top:12px}
.bio-release-links a{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;transition:.15s}
.bio-release-links a:hover{box-shadow:var(--shadow);border-color:var(--txt)}
.bio-release audio{width:100%;margin-top:12px;height:32px}
.bio-links{display:flex;flex-direction:column;gap:10px;margin:0 0 14px}
.bio-link{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-weight:600;background:#fff;transition:.15s}
.bio-link:hover{border-color:var(--txt);box-shadow:var(--shadow)}
.bio-link svg{flex:none}
.bio-social-row{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;margin:10px 0 18px}
.bio-social-row a{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;transition:.15s}
.bio-social-row a:hover{box-shadow:var(--shadow);border-color:var(--txt)}
.bio-spotify{border-radius:14px;overflow:hidden;margin:0 0 14px;background:var(--panel2)}
.bio-spotify iframe{display:block;width:100%;height:352px;border:0}
.bio-youtube{border-radius:14px;overflow:hidden;margin:0 0 14px;position:relative;padding-bottom:56.25%;height:0;background:var(--panel2)}
.bio-youtube iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.bio-instagram{display:flex;gap:10px;margin:0 0 14px}
.bio-instagram a{flex:1;aspect-ratio:1;border-radius:12px;overflow:hidden;display:block;background:var(--panel2)}
.bio-instagram img{width:100%;height:100%;object-fit:cover;display:block}
.bio-tiktok{display:flex;gap:10px;margin:0 0 14px}
.bio-tiktok a{flex:1;aspect-ratio:3/4;border-radius:12px;overflow:hidden;display:block;background:var(--panel2);position:relative}
.bio-tiktok img{width:100%;height:100%;object-fit:cover;display:block}
.bio-tiktok .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;text-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:none}
.bio-events{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff;margin:0 0 14px}
.bio-events-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:10px}
.bio-events-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.ev-chip{border:1px solid var(--line);border-radius:10px;overflow:hidden;text-align:center;padding-bottom:5px}
.ev-chip .dow{background:var(--brand);color:#fff;font-size:9px;font-weight:700;padding:3px 2px}
.ev-chip .d{font-family:var(--f-display);font-size:18px;font-weight:700;padding:4px 0 1px}
.ev-chip .mo{font-size:9px;color:var(--muted);font-weight:600;padding:0 2px}
.bio-foot{text-align:center;margin-top:22px;font-size:12px;color:var(--muted)}
</style>
</head>

function releasePlatformLinks(a, r){
  const q=encodeURIComponent(`${r.title||''} ${a.stage_name||''}`.trim());
  const items=[
    ['applemusic', SOCIAL_SVG.applemusic, r.itunes_url || `https://music.apple.com/search?term=${q}`, '#fa243c', 'Apple Music'],
    ['spotify', SOCIAL_SVG.spotify, `https://open.spotify.com/search/${q}`, '#1db954', 'Spotify'],
    ['youtube', SOCIAL_SVG.youtube, `https://www.youtube.com/results?search_query=${q}`, '#f00', 'YouTube'],
    ['amazon', AMAZON_SVG, `https://www.amazon.it/s?k=${q}&i=digital-music`, '#ff9900', 'Amazon Music'],
  ];
  return `<div class="bio-release-links">${items.map(([k,svg,href,color,label])=>`
    <a href="${esc(href)}" target="_blank" rel="noopener" title="${label}" style="color:${color}" onclick="event.stopPropagation()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">${svg}</svg></a>`).join('')}</div>`;
}

function releaseBox(a){
  const r=(a.stats||{}).itunes;
  if(!r || (!r.title && !r.preview_url)) return '';
  const cover=r.artwork?`<img src="${esc(r.artwork)}" alt="" referrerpolicy="no-referrer">`:'🎵';
  const sub=[r.collection, r.release_date?new Date(r.release_date+'T00:00:00').toLocaleDateString('it-IT'):null].filter(Boolean).join(' · ');
  const top=`
    <div class="bio-release-top">
      <div class="bio-release-cover">${cover}</div>
      <div style="min-width:0;flex:1">
        <div class="bio-release-label">Ultima uscita</div>
        <div class="bio-release-title">${esc(r.title||'—')}</div>
        ${sub?`<div class="bio-release-sub">${esc(sub)}</div>`:''}
      </div>
    </div>`;
  const wrapped = r.itunes_url
    ? `<a href="${esc(r.itunes_url)}" target="_blank" rel="noopener" style="display:block">${top}</a>` : top;
  const player = r.preview_url ? `<audio controls preload="none" src="${esc(r.preview_url)}"></audio>` : '';
  return `<div class="bio-release">${wrapped}${releasePlatformLinks(a, r)}${player}</div>`;
}

function spotifyPopularBox(a){
  const m=((a.socials||{}).spotify||'').match(/\/artist\/([A-Za-z0-9]+)/);
  if(!m) return '';
  return `<div class="bio-spotify">${gatedEmbed(`<iframe src="https://open.spotify.com/embed/artist/${m[1]}?utm_source=generator"
    allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>`,'Spotify')}</div>`;
}

function youtubeBox(a){
  const id=(a.stats||{}).youtube_video;
  if(!id) return '';
  return gatedEmbed(`<div class="bio-youtube"><iframe src="https://www.youtube.com/embed/${esc(id)}"
    allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen loading="lazy"></iframe></div>`,'YouTube');
}

function instagramBox(a){
  const photos=((a.stats||{}).instagram_photos||[]).slice(0,3);
  if(!photos.length || !(a.socials||{}).instagram) return '';
  const href=esc(socialHref('instagram',a.socials.instagram));
  const v=encodeURIComponent(a.stats_updated_at||'');
  return `<div class="bio-instagram">${photos.map((u,i)=>`
      <a href="${href}" target="_blank" rel="noopener" title="Apri il profilo Instagram">
        <img src="/api/ig-photo.php?u=${a.user_id}&i=${i}&v=${v}" loading="lazy" alt="" onerror="this.closest('a').style.display='none'">
      </a>`).join('')}</div>`;
}

function tiktokBox(a){
  const ids=((a.stats||{}).tiktok_videos||[]).slice(0,3);
  if(!ids.length || !(a.socials||{}).tiktok) return '';
  const handle=(a.socials.tiktok.match(/tiktok\.com\/@?([\w.]+)/)||[,a.socials.tiktok.replace(/^@/,'')])[1];
  const v=encodeURIComponent(a.stats_updated_at||'');
  return `<div class="bio-tiktok">${ids.map((id,i)=>`
      <a href="https://www.tiktok.com/@${esc(handle)}/video/${esc(id)}" target="_blank" rel="noopener" title="Guarda su TikTok">
        <img src="/api/tiktok-photo.php?u=${a.user_id}&i=${i}&v=${v}" loading="lazy" alt="" onerror="this.closest('a').style.display='none'">
        <span class="play">▶</span>
      </a>`).join('')}</div>`;
}

async function init(){
  try{ A=(await api('artist-get.php?slug='+encodeURIComponent(slug))).artist; }
  catch(e){ document.getElementById('main').innerHTML=`<div class="empty">Artista non trovato.<br><a class="btn ghost sm" style="margin-top:14px" href="/">Torna a 148 Roster</a></div>`; return; }
  document.title=(A.stage_name||'Artista')+' · Link · 148 Roster';
  render();
}

function bioBox(a){
  if(!a.bio) return '';
  return `<div class="bio-box" id="bioBox">
    <p id="bioText">${esc(a.bio)}</p>
    <span class="more" id="bioMore">Leggi tutto</span>
  </div>`;
}

function setupBioToggle(){
  const box=document.getElementById('bioBox'); if(!box) return;
  const text=document.getElementById('bioText'), more=document.getElementById('bioMore');
  if(text.scrollHeight <= text.clientHeight + 2) return;   // testo corto: niente troncamento, niente toggle
  box.classList.add('clampable');
  more.style.display='block';
  box.onclick=()=>{
    box.classList.toggle('open');
    more.textContent = box.classList.contains('open') ? 'Chiudi' : 'Leggi tutto';
  };
}

const GIORNI_SETT=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MESI_INTERI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
function eventsBox(a){
  const today=new Date().toISOString().slice(0,10);
  const busy=(a.calendar_busy||[]).filter(d=>d>=today).sort();
  if(!busy.length) return '';
  const chips=busy.slice(0,5).map(d=>{
    const dt=new Date(d+'T00:00:00');
    return `<div class="ev-chip">
      <div class="dow">${GIORNI_SETT[dt.getDay()]}</div>
      <div class="d">${dt.getDate()}</div>
      <div class="mo">${MESI_INTERI[dt.getMonth()]}</div>
    </div>`;
  }).join('');
  return `<div class="bio-events">
    <div class="bio-events-label">Prossimi eventi</div>
    <div class="bio-events-grid">${chips}</div>
    <a class="btn ghost sm" style="width:100%;display:block;text-align:center;box-sizing:border-box" href="https://www.148booking.it/eventi.html" target="_blank" rel="noopener">Vedi tutti gli eventi</a>
  </div>`;
}

function infoBox(a){
  const genres=(a.genres||[]).map(g=>g.name).filter(Boolean);
  const cards=[];
  if(a.comune) cards.push(`<div class="ig-card"><div class="ig-label">From</div><div class="ig-value">${esc(a.comune)}${a.provincia?' ('+esc(a.provincia)+')':''}</div></div>`);
  if(a.formazione) cards.push(`<div class="ig-card"><div class="ig-label">Tipo di Show</div><div class="ig-value">${esc(showLabel(a.formazione))}</div></div>`);
  if(genres.length) cards.push(`<div class="ig-card full"><div class="ig-label">Genere</div><div class="tags">${genres.map(g=>`<span class="tag">${esc(g)}</span>`).join('')}</div></div>`);
  if(!cards.length) return '';
  return `<div class="bio-infogrid">${cards.join('')}</div>`;
}

function customLinksBox(a){
  const links=(a.custom_links||[]).filter(l=>l&&l.title&&l.url);
  if(!links.length) return '';
  return `<div class="bio-links">${links.map(l=>`
    <a class="bio-link" target="_blank" rel="noopener" href="${esc(l.url)}">
      <span style="font-size:19px">🔗</span>
      <span>${esc(l.title)}</span></a>`).join('')}</div>`;
}

function socialRow(a){
  const items=Object.entries(a.socials||{}).filter(([k,v])=>v&&SOCIAL_SVG[k])
    .map(([k,v])=>[k, socialHref(k,v), SM[k]&&SM[k][1], SM[k]?SM[k][0]:k]);
  if (a.website) items.push(['website', a.website, '#555', 'Sito web']);
  if(!items.length) return '';
  return `<div class="bio-social-row">${items.map(([k,href,color,label])=>`
    <a href="${esc(href)}" target="_blank" rel="noopener" title="${esc(label)}" style="color:${color||'#555'}">
      <svg viewBox="0 0 24 24" width="19" height="19" fill="currentColor">${SOCIAL_SVG[k]}</svg></a>`).join('')}</div>`;
}

function render(){
  const a=A;
  document.getElementById('main').innerHTML=`
    <div class="bio-avatar">${a.photo_url?`<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer" alt="">`:'🎵'}</div>
    <h1 class="bio-name">${a.verified?'<span class="vchk" title="Artista verificato">✓</span> ':''}${esc(a.stage_name||'Artista')}</h1>
    ${socialRow(a)}

    ${releaseBox(a)}
    ${spotifyPopularBox(a)}
    ${youtubeBox(a)}
    ${instagramBox(a)}
    ${tiktokBox(a)}
    ${bioBox(a)}
    ${eventsBox(a)}
    ${customLinksBox(a)}
    ${infoBox(a)}

    <a class="btn primary" style="width:100%;display:block;text-align:center;box-sizing:border-box;margin-top:8px" href="/${esc(a.slug||'')}">Booking: chiedi disponibilità</a>

    <div class="bio-foot">Pagina gestita su <a href="/" style="text-decoration:underline">148 Roster</a></div>`;
  setupBioToggle();
}
init();
</script>
</body>
</html>
