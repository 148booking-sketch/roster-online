<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mappa artisti · 148 Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
#map{height:calc(100vh - 80px);width:100%;position:relative}
@media(max-width:860px){#map{height:calc(100vh - 64px)}}
.artist-pin{background:none;border:0}
.pin{width:48px;height:48px;position:relative;transform:translateY(-6px)}
.pin img,.pin .fallback{width:44px;height:44px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);background:#eee}
.pin .fallback{display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,#f0f0f0,#ddd)}
.pin:after{content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);border:7px solid transparent;border-top-color:#fff}
.pin.vok img,.pin.vok .fallback{border-color:var(--brand)}
.pin-count{position:absolute;top:-4px;right:-4px;background:var(--brand);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.leaflet-popup-content{margin:12px 14px;font-family:var(--f-body)}
.site-footer{margin-top:0}
.pp .nm{font-weight:700;font-size:15px}
.pp .mt{color:var(--muted);font-size:13px;margin:2px 0 8px}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>
<div id="map"></div>

<script src="/assets/api.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const cap=s=>s?s[0].toUpperCase()+s.slice(1):'';
function cachet(a){ const v=a.cachet_min??a.cachet_max; if(v==null) return 'Trattativa riservata'; if(v===0) return 'Disponibile, senza impegno'; return 'da '+eur(v)+' a serata'; }

async function init(){
  await renderNav();
  initGatedMap('map', initArtistMap);
}
// Caricamento rimandato al consenso cookie per terze parti (la mappa usa riquadri OpenStreetMap/CARTO)
async function initArtistMap(){
  const map = L.map('map',{scrollWheelZoom:true}).setView([42.2,12.6],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19}).addTo(map);

  let data, locked=false, pendingVerification=false;
  try{ const r=await api('artists-map.php'); data=r.artists; locked=!!r.locked; pendingVerification=!!r.pending_verification; }catch(e){ toast('Errore caricamento mappa',true); return; }
  if(!data.length){ toast('Nessun artista geolocalizzato ancora'); return; }

  const layer = L.layerGroup().addTo(map);
  renderArtistPins(map, layer, data, {fit:true, locked, pendingVerification});
}
init();
</script>
</body>
</html>
