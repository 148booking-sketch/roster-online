<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mappa artisti · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* layout 11a: elenco a sinistra, mappa a destra */
.map-wrap{display:flex;height:calc(100vh - 81px)}
.map-side{width:360px;flex:none;border-right:1px solid var(--line2);display:flex;flex-direction:column;background:#fff}
.ms-head{padding:16px 20px;border-bottom:1px solid var(--line2)}
.ms-head .t{font:700 16px var(--f-display)}
.ms-head .s{font-size:12.5px;color:var(--muted)}
.ms-list{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.ms-item{display:flex;gap:12px;padding:10px;border:1px solid var(--line2);border-radius:12px;cursor:pointer;background:#fff;text-align:left;font-family:inherit}
.ms-item:hover,.ms-item.on{border-color:var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ms-pic{width:56px;height:56px;border-radius:10px;overflow:hidden;flex:none;color:#fff;display:flex;align-items:center;justify-content:center}
.ms-pic img{width:100%;height:100%;object-fit:cover}
.ms-nm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:5px}
.ms-mt{font-size:12px;color:var(--muted)}
.ms-pr{font-size:13px;font-weight:600;margin-top:3px}
#map{flex:1;min-width:0;position:relative}
@media(max-width:860px){
  .map-wrap{flex-direction:column;height:auto}
  .map-side{width:100%;border-right:0;order:2;max-height:44vh}
  #map{height:52vh;order:1}
}
.artist-pin{background:none;border:0}
.pin{width:48px;height:48px;position:relative;transform:translateY(-6px)}
.pin img,.pin .fallback{width:44px;height:44px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);background:#eee}
.pin .fallback{display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,#f0f0f0,#ddd)}
.pin:after{content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);border:7px solid transparent;border-top-color:#fff}
.pin.vok img,.pin.vok .fallback{border-color:var(--brand)}
.pin-count{position:absolute;top:-4px;right:-4px;background:var(--brand);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.leaflet-popup-content{margin:12px 14px;font-family:var(--f-body)}
.site-footer{margin-top:0}
.pp .nm{font-weight:700;font-size:15px}
.pp .mt{color:var(--muted);font-size:13px;margin:2px 0 8px}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<div class="map-wrap">
  <aside class="map-side">
    <div class="ms-head">
      <div class="t" id="msTitle">Artisti sulla mappa</div>
      <div class="s">Italia ed estero · clicca un artista per trovarlo sulla mappa</div>
    </div>
    <div class="ms-list" id="msList"><div class="empty">Caricamento…</div></div>
  </aside>
  <div id="map"></div>
</div>

<script src="/assets/api.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let MAP=null, DATA=[], LOCKED=false;
function cachet(a){ const v=a.cachet_min??a.cachet_max;
  if(LOCKED) return 'Prezzo riservato';
  if(v==null) return 'Trattativa riservata'; if(v===0) return 'Senza impegno'; return 'da '+eur(v); }

async function init(){
  await renderNav();
  try{
    const r=await api('artists-map.php');
    DATA=r.artists||[]; LOCKED=!!r.locked;
  }catch(e){ toast('Errore caricamento mappa',true); return; }
  renderList();
  initGatedMap('map', initArtistMap);
}
function renderList(){
  document.getElementById('msTitle').textContent = DATA.length+' artist'+(DATA.length===1?'a':'i')+' sulla mappa';
  document.getElementById('msList').innerHTML = DATA.length ? DATA.map((a,i)=>{
    const pic=a.photo_url?`<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer" alt="">`:esc(avatarInitials(a.stage_name||'A'));
    const meta=[showLabel(a.formazione),a.comune].filter(Boolean).join(' · ');
    return `<button class="ms-item" id="ms-${i}" onclick="focusArtist(${i})">
      <span class="ms-pic" style="background:${avatarColor(a.stage_name||'A')}">${pic}</span>
      <span style="min-width:0;flex:1">
        <span class="ms-nm">${esc(a.stage_name||'Artista')}${a.verified?'<span class="vchk">✓</span>':''}</span>
        <span class="ms-mt" style="display:block">${esc(meta)}</span>
        <span class="ms-pr" style="display:block">${cachet(a)}</span>
      </span>
    </button>`;
  }).join('') : '<div class="empty"><span class="et">Nessun artista geolocalizzato</span></div>';
}
function focusArtist(i){
  document.querySelectorAll('.ms-item').forEach(x=>x.classList.remove('on'));
  document.getElementById('ms-'+i)?.classList.add('on');
  const a=DATA[i];
  if(MAP && a && a.lat!=null){ MAP.setView([+a.lat,+a.lng], 11, {animate:true}); }
}
// Caricamento rimandato al consenso cookie per terze parti (la mappa usa riquadri OpenStreetMap/CARTO)
async function initArtistMap(){
  MAP = L.map('map',{scrollWheelZoom:true}).setView([42.2,12.6],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19}).addTo(MAP);
  if(!DATA.length) return;
  const layer = L.layerGroup().addTo(MAP);
  renderArtistPins(MAP, layer, DATA, {fit:true, locked:LOCKED});
}
init();
</script>
</body>
</html>
