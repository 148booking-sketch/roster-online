<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mappa artisti · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
/* layout 11a: elenco a sinistra, mappa a destra */
.map-wrap{display:flex;height:calc(100vh - 81px)}
.pshell .map-wrap{height:100vh}
.map-side{width:360px;flex:none;border-right:1px solid var(--line2);display:flex;flex-direction:column;background:#fff}
.ms-head{padding:16px 20px;border-bottom:1px solid var(--line2)}
.ms-head .t{font:700 16px var(--f-display)}
.ms-head .s{font-size:12.5px;color:var(--muted)}
.ms-search{display:flex;align-items:center;background:#f2f2f2;border-radius:9px;padding:2px 12px;gap:8px;margin-top:12px}
.ms-search input{flex:1;min-width:0;border:0;background:none;padding:8px 0;font-size:13px;outline:0;font-family:inherit}
.ms-clear{border:0;background:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px}
.ms-list{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:5px}
.ms-item{display:flex;gap:10px;padding:7px 9px;border:1px solid var(--line2);border-radius:10px;cursor:pointer;background:#fff;text-align:left;font-family:inherit;align-items:center}
.ms-item:hover,.ms-item.on{border-color:var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ms-pic{width:38px;height:38px;border-radius:9px;overflow:hidden;flex:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.ms-pic img{width:100%;height:100%;object-fit:cover}
.ms-nm{font-weight:600;font-size:13px;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden}
.ms-mt{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-pr{font-size:11.5px;font-weight:600;color:#0a7d38;white-space:nowrap}
#map{flex:1;min-width:0;position:relative}
@media(max-width:860px){
  .map-wrap{flex-direction:column;height:auto}
  .map-side{width:100%;border-right:0;order:2;max-height:44vh}
  #map{height:52vh;order:1}
}
.artist-pin{background:none;border:0}
.pin{width:48px;height:48px;position:relative;transform:translateY(-6px)}
.pin img,.pin .fallback{width:44px;height:44px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);background:#eee}
.pin .fallback{display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,#f0f0f0,#ddd)}
.pin:after{content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);border:7px solid transparent;border-top-color:#fff}
.pin.vok img,.pin.vok .fallback{border-color:var(--brand)}
.pin-count{position:absolute;top:-4px;right:-4px;background:var(--brand);color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:11px;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.leaflet-popup-content{margin:12px 14px;font-family:var(--f-body)}
.site-footer{margin-top:0}
.pp .nm{font-weight:700;font-size:15px}
.pp .mt{color:var(--muted);font-size:13px;margin:2px 0 8px}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<div id="pageContent" style="display:none">
<div class="map-wrap">
  <aside class="map-side">
    <div class="ms-head">
      <div class="t" id="msTitle">Artisti sulla mappa</div>
      <div class="s">Italia ed estero · clicca un artista per trovarlo sulla mappa</div>
      <div class="ms-search">
        <span data-ic="search" data-ic-size="15" data-ic-stroke="1.9" style="color:var(--muted)"></span>
        <input id="msQ" list="msPlaces" placeholder="Regione, città o estero…" autocomplete="off"
          oninput="applyPlaceFilter()" onchange="applyPlaceFilter()">
        <button type="button" class="ms-clear" id="msClear" style="display:none" onclick="clearPlaceFilter()">✕</button>
      </div>
      <datalist id="msPlaces"></datalist>
      <button type="button" class="btn dark sm" style="width:100%;margin-top:9px" onclick="clearPlaceFilter()">Tutti gli artisti</button>
    </div>
    <div class="ms-list" id="msList"><div class="empty">Caricamento…</div></div>
  </aside>
  <div id="map"></div>
</div>
</div><!-- /pageContent -->

<script src="/assets/api.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let MAP=null, DATA=[], VIEW=[], LOCKED=false, LAYER=null;
/* sigla provincia → regione (per il filtro "regione" senza campo dedicato in DB) */
const PR_REG={AG:'Sicilia',AL:'Piemonte',AN:'Marche',AO:'Valle d\'Aosta',AR:'Toscana',AP:'Marche',AT:'Piemonte',AV:'Campania',BA:'Puglia',BT:'Puglia',BL:'Veneto',BN:'Campania',BG:'Lombardia',BI:'Piemonte',BO:'Emilia-Romagna',BZ:'Trentino-Alto Adige',BS:'Lombardia',BR:'Puglia',CA:'Sardegna',CL:'Sicilia',CB:'Molise',CE:'Campania',CT:'Sicilia',CZ:'Calabria',CH:'Abruzzo',CO:'Lombardia',CS:'Calabria',CR:'Lombardia',KR:'Calabria',CN:'Piemonte',EN:'Sicilia',FM:'Marche',FE:'Emilia-Romagna',FI:'Toscana',FG:'Puglia',FC:'Emilia-Romagna',FR:'Lazio',GE:'Liguria',GO:'Friuli-Venezia Giulia',GR:'Toscana',IM:'Liguria',IS:'Molise',SP:'Liguria',AQ:'Abruzzo',LT:'Lazio',LE:'Puglia',LC:'Lombardia',LI:'Toscana',LO:'Lombardia',LU:'Toscana',MC:'Marche',MN:'Lombardia',MS:'Toscana',MT:'Basilicata',ME:'Sicilia',MI:'Lombardia',MO:'Emilia-Romagna',MB:'Lombardia',NA:'Campania',NO:'Piemonte',NU:'Sardegna',OR:'Sardegna',PD:'Veneto',PA:'Sicilia',PR:'Emilia-Romagna',PV:'Lombardia',PG:'Umbria',PU:'Marche',PE:'Abruzzo',PC:'Emilia-Romagna',PI:'Toscana',PT:'Toscana',PN:'Friuli-Venezia Giulia',PZ:'Basilicata',PO:'Toscana',RG:'Sicilia',RA:'Emilia-Romagna',RC:'Calabria',RE:'Emilia-Romagna',RI:'Lazio',RN:'Emilia-Romagna',RM:'Lazio',RO:'Veneto',SA:'Campania',SS:'Sardegna',SV:'Liguria',SI:'Toscana',SR:'Sicilia',SO:'Lombardia',SU:'Sardegna',TA:'Puglia',TE:'Abruzzo',TR:'Umbria',TO:'Piemonte',TP:'Sicilia',TN:'Trentino-Alto Adige',TV:'Veneto',TS:'Friuli-Venezia Giulia',UD:'Friuli-Venezia Giulia',VA:'Lombardia',VE:'Veneto',VB:'Piemonte',VC:'Piemonte',VR:'Veneto',VV:'Calabria',VI:'Veneto',VT:'Lazio'};
function regionOf(a){ return a.provincia ? (PR_REG[String(a.provincia).toUpperCase()]||null) : null; }
function isForeign(a){ return !a.provincia; }   // niente sigla provincia = città estera
function cachet(a){ const v=a.cachet_min??a.cachet_max;
  if(LOCKED) return 'Prezzo riservato';
  if(v==null) return 'Trattativa riservata'; if(v===0) return 'Senza impegno'; return 'da '+eur(v); }

async function init(){
  const me = await getMe(true);
  if (me.user && ['promoter','management'].includes(me.user.role)) mountPromoterShell(me.user,'mappa');
  else { await renderNav(); document.getElementById('pageContent').style.display=''; }
  try{
    const r=await api('artists-map.php');
    DATA=r.artists||[]; LOCKED=!!r.locked;
  }catch(e){ toast('Errore caricamento mappa',true); return; }
  VIEW=DATA;
  buildPlaceSuggestions();
  renderList();
  initGatedMap('map', initArtistMap);
  injectIcons();
}
function renderList(){
  const tot=DATA.length, n=VIEW.length;
  document.getElementById('msTitle').textContent = (n===tot? n : n+' / '+tot)+' artist'+(n===1?'a':'i')+' sulla mappa';
  document.getElementById('msList').innerHTML = VIEW.length ? VIEW.map((a,i)=>{
    const pic=a.photo_url?`<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer" alt="">`:esc(avatarInitials(a.stage_name||'A'));
    const meta=[showLabel(a.formazione),a.comune].filter(Boolean).join(' · ');
    return `<button class="ms-item" id="ms-${i}" onclick="focusArtist(${i})">
      <span class="ms-pic" style="background:${avatarColor(a.stage_name||'A')}">${pic}</span>
      <span style="min-width:0;flex:1">
        <span class="ms-nm">${esc(a.stage_name||'Artista')}${a.verified?'<span class="vchk">✓</span>':''}</span>
        <span class="ms-mt" style="display:block">${esc(meta)}${cachet(a)?' · ':''}<span class="ms-pr">${cachet(a)}</span></span>
      </span>
    </button>`;
  }).join('') : '<div class="empty"><span class="et">Nessun artista qui</span>Prova con un altro luogo o torna a Tutti gli artisti.</div>';
}

/* ---- filtro unico per luogo: regioni + città italiane + città estere + "Estero" ---- */
function buildPlaceSuggestions(){
  const sug=new Set();
  DATA.forEach(a=>{
    if(a.comune) sug.add(a.comune);
    const r=regionOf(a); if(r) sug.add(r);
  });
  if(DATA.some(isForeign)) sug.add('Estero');
  document.getElementById('msPlaces').innerHTML =
    [...sug].sort((a,b)=>a.localeCompare(b,'it')).map(s=>`<option value="${esc(s)}">`).join('');
}
function applyPlaceFilter(){
  const q=(document.getElementById('msQ').value||'').trim().toLowerCase();
  document.getElementById('msClear').style.display = q?'':'none';
  if(!q){ VIEW=DATA; renderList(); redrawPins(true); return; }
  VIEW=DATA.filter(a=>{
    if(q==='estero') return isForeign(a);
    const reg=(regionOf(a)||'').toLowerCase();
    const com=(a.comune||'').toLowerCase();
    return com.includes(q) || reg===q || reg.startsWith(q);
  });
  renderList(); redrawPins(true);
}
function clearPlaceFilter(){
  document.getElementById('msQ').value='';
  applyPlaceFilter();
}
function redrawPins(fit){
  if(!MAP||!LAYER) return;
  renderArtistPins(MAP, LAYER, VIEW, {fit:!!fit, locked:LOCKED});
}
function focusArtist(i){
  document.querySelectorAll('.ms-item').forEach(x=>x.classList.remove('on'));
  document.getElementById('ms-'+i)?.classList.add('on');
  const a=VIEW[i];
  if(MAP && a && a.lat!=null){ MAP.setView([+a.lat,+a.lng], 11, {animate:true}); }
}
// Caricamento rimandato al consenso cookie per terze parti (la mappa usa riquadri OpenStreetMap/CARTO)
async function initArtistMap(){
  MAP = L.map('map',{scrollWheelZoom:true}).setView([42.2,12.6],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19}).addTo(MAP);
  if(!DATA.length) return;
  LAYER = L.layerGroup().addTo(MAP);
  renderArtistPins(MAP, LAYER, VIEW, {fit:true, locked:LOCKED});
}
init();
</script>
</body>
</html>
