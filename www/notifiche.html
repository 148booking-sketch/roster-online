<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifiche · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;max-width:900px}
@media(max-width:960px){.acc-grid{grid-template-columns:1fr}}
.acc-card{background:#fff;border:1px solid var(--line2);border-radius:16px;padding:20px}
.acc-card h3{font:600 15px var(--f-display);margin:0 0 6px;display:flex;align-items:center;gap:8px}
.acc-card .csub{font-size:12.5px;color:var(--muted);margin:0 0 16px}
/* feed notifiche (7a) */
.nf-box{background:#fff;border:1px solid var(--line2);border-radius:16px;overflow:hidden}
.nf-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line2)}
.nf-head b{font:600 15px var(--f-display)}
.nf-new{font:600 11px var(--f-body);color:#fff;background:var(--brand);border-radius:20px;padding:2px 8px}
.nf-item{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;border-bottom:1px solid #f2f2f2}
.nf-item:last-child{border-bottom:0}
.nf-item.unread{background:#fdf5f8}
.nf-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.nf-tx{flex:1;min-width:0;font-size:13.5px}
.nf-when{font-size:11.5px;color:#9a9aa2;margin-top:2px}
.nf-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);flex:none;margin-top:6px}
.nf-empty{padding:26px 18px;text-align:center;color:var(--muted);font-size:13.5px}
/* segmented control riepilogo (7a) */
.seg{display:grid;grid-template-columns:repeat(4,1fr);background:#f2f2f2;border-radius:11px;padding:4px;gap:2px;width:100%}
.seg button{font:600 13px var(--f-body);color:#717171;padding:10px 4px;border-radius:8px;border:0;background:none;cursor:pointer;font-family:inherit;white-space:nowrap;outline:none;transition:.15s}
.seg button:hover{color:#222}
.seg button.on{color:#222;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}
@media(max-width:420px){.seg button{font-size:12px}}
.consent-row{display:flex;gap:10px;align-items:center;font-size:12.5px;color:var(--muted);margin-top:14px}
.consent-row .switch .slider:before{width:18px;height:18px}
.consent-row .switch input:checked + .slider:before{transform:translateX(18px)}
.savebar{display:flex;justify-content:flex-end;margin-top:18px}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<div id="pageContent" style="display:none">
  <div class="pmain-pad" id="pagePad">
    <h1 class="ptitle">Notifiche</h1>
    <p class="psub">Cosa è successo e come vuoi essere avvisato.</p>

    <div class="acc-grid">
      <div class="nf-box">
        <div class="nf-head"><b>Recenti</b><span class="nf-new" id="nfNew" style="display:none"></span>
          <a style="margin-left:auto;font-size:12.5px;color:var(--brand2);font-weight:600;cursor:pointer" onclick="markAllRead()">Segna tutte come lette</a></div>
        <div id="nfList"><div class="nf-empty">Carico…</div></div>
      </div>

      <form class="acc-card" id="emailPrefsBox" style="display:none" onsubmit="return saveEmailPrefs(event)">
        <h3 data-ic="mail" data-ic-size="16">Riepilogo email</h3>
        <p class="csub">Un solo riepilogo con tutte le novità (nuovi artisti, promo, risposte), alla frequenza che preferisci.</p>
        <div class="seg" id="freqSeg">
          <button type="button" data-f="off">Nessuno</button>
          <button type="button" data-f="daily">Giornaliero</button>
          <button type="button" data-f="weekly">Settimanale</button>
          <button type="button" data-f="monthly">Mensile</button>
        </div>
        <label class="consent-row" style="cursor:pointer"><span class="switch" style="width:42px;height:24px"><input type="checkbox" id="ep_consent"><span class="slider"></span></span><span style="flex:1">Acconsento a ricevere queste email da Booking Roster.</span></label>
        <div class="hint" id="ep_consentAt" style="margin-top:6px"></div>
        <div class="savebar"><button class="btn primary sm">Salva preferenze</button></div>
      </form>
    </div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
let FREQ='off';
(async function init(){
  const me = await getMe(true);
  if (!me.user){ location.href = '/accedi.html'; return; }
  if (['artist','promoter','management'].includes(me.user.role)) mountPromoterShell(me.user,'notifiche');
  else { await renderNav(); document.getElementById('pageContent').style.display=''; document.getElementById('pagePad').classList.remove('pmain-pad'); document.getElementById('pagePad').classList.add('container','section'); }
  injectIcons();
  if (['promoter','management'].includes(me.user.role)) initEmailPrefs(me.profile || {});
  loadFeed();
  const params = new URLSearchParams(location.search);
  if (params.get('unsub') === 'ok')   toast('Disiscrizione dagli alert email effettuata ✓');
  if (params.get('unsub') === 'fail') toast('Link di disiscrizione non valido', true);
})();

/* ---- feed notifiche (7a) ---- */
const NF_STYLE={check:['#eafaf0','#0a7d38'], x:['#f2f2f2','#717171'], inbox:['#eaf1fb','#2563eb'],
  message:['#fbe9ee','#b81e47'], clock:['#fff7e6','#a5730a'], heart:['#fbe9ee','#d52454'], bell:['#fff7e6','#a5730a']};
async function loadFeed(){
  const list = await loadNotifs(true);
  const seen = +(localStorage.getItem(NOTIF_SEEN_KEY)||0);
  const el=document.getElementById('nfList');
  if(!list.length){ el.innerHTML='<div class="nf-empty">Nessuna notifica per ora.</div>'; return; }
  let unread=0;
  el.innerHTML=list.map(n=>{
    const isNew=new Date((n.ts||'').replace(' ','T')).getTime()>seen;
    if(isNew) unread++;
    const st=NF_STYLE[n.icon]||['#f2f2f2','#717171'];
    return `<div class="nf-item${isNew?' unread':''}">
      <span class="nf-ic" style="background:${st[0]};color:${st[1]}">${icon(n.icon||'inbox',17,1.9)}</span>
      <div class="nf-tx"><div><b>${esc(n.title)}</b>${n.meta?' · '+esc(n.meta):''}</div><div class="nf-when">${notifTimeAgo(n.ts)}</div></div>
      ${isNew?'<span class="nf-dot"></span>':''}
    </div>`;
  }).join('');
  const badge=document.getElementById('nfNew');
  if(unread>0){ badge.textContent=unread+' nuove'; badge.style.display=''; }
}
function markAllRead(){
  localStorage.setItem(NOTIF_SEEN_KEY, String(Date.now()));
  document.getElementById('nfNew').style.display='none';
  document.querySelectorAll('.nf-item.unread').forEach(x=>x.classList.remove('unread'));
  document.querySelectorAll('.nf-dot').forEach(x=>x.remove());
  const dot=document.getElementById('psNotif'); if(dot) dot.style.display='none';
}

/* ---- riepilogo email (solo promoter/agenzia) ---- */
function initEmailPrefs(p){
  document.getElementById('emailPrefsBox').style.display = '';
  FREQ = p.email_freq || 'off';
  paintSeg();
  ep_consent.checked = FREQ !== 'off';
  document.getElementById('ep_consentAt').textContent = p.email_consent_at
    ? 'Consenso registrato il ' + new Date(p.email_consent_at.replace(' ','T')).toLocaleDateString('it-IT') : '';
  document.querySelectorAll('#freqSeg button').forEach(b=>b.onclick=()=>{ FREQ=b.dataset.f; if(FREQ!=='off') ep_consent.checked=true; paintSeg(); });
}
function paintSeg(){ document.querySelectorAll('#freqSeg button').forEach(b=>b.classList.toggle('on',b.dataset.f===FREQ)); }
async function saveEmailPrefs(e){ e.preventDefault();
  if (FREQ !== 'off' && !ep_consent.checked){ toast('Serve il consenso per attivare il riepilogo', true); return false; }
  try {
    await api('promoter-email-prefs-save.php',{method:'POST',body:{ freq: FREQ, consent: ep_consent.checked }});
    toast('Preferenze salvate ✓');
  } catch(err){ toast(errMsg(err), true); }
  return false;
}
</script>
</body>
</html>
