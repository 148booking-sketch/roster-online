<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preferiti · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
/* Preferiti = matrice disponibilità (ex pagina calendario) SOLO sugli artisti salvati.
   Click su un giorno libero → popup richiesta booking con quella data. */
.avz{padding:26px 30px 60px}
.avz-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.avz-head h1{font:700 22px var(--f-display);letter-spacing:-.4px;margin:0}
.avz-head .sub2{font-size:13px;color:var(--muted);margin-top:2px}
.avz-nav{margin-left:auto;display:flex;align-items:center;gap:10px;font:600 13px var(--f-body)}
.avz-nav .lbl{color:var(--muted);text-transform:capitalize}
.avz-nav button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.avz-nav button:hover:not(:disabled){background:var(--panel2)}
.avz-nav button:disabled{opacity:.35;cursor:default}
.avz-legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-bottom:14px}
.avz-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
.avz-box{background:#fff;border:1px solid var(--line2);border-radius:16px;padding:16px 18px;overflow-x:auto}
.avz-grid{display:grid;grid-template-columns:160px repeat(16,minmax(22px,1fr));gap:3px;align-items:center;min-width:700px}
.avz-dow{text-align:center;font:700 9px var(--f-body);color:#9a9aa2;line-height:1.2}
.avz-dow b{display:block;color:#222;font-size:12px}
.avz-dow .mo{display:block;color:#9a9aa2;font-size:8.5px;letter-spacing:.04em}
.avz-dow.today b,.avz-dow.today .mo{color:var(--brand)}
.avz-artist{display:flex;align-items:center;gap:8px;min-width:0;cursor:pointer}
.avz-artist:hover .nm{text-decoration:underline}
.avz-ava{width:26px;height:26px;border-radius:50%;overflow:hidden;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex:none}
.avz-ava img{width:100%;height:100%;object-fit:cover}
.avz-artist .nm{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avz-artist .mt{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.avz-cell{height:22px;border-radius:5px;background:#eafaf0;cursor:pointer}
.avz-cell.busy{background:#fbeaef;cursor:default}
.avz-cell.na{background:#f2f2f2;cursor:default}
.avz-cell:not(.busy):not(.na):hover{outline:2px solid var(--brand);outline-offset:-1px}
.avz-sep{grid-column:1/-1;height:1px;background:#f2f2f2}
.avz-hint{font-size:12px;color:var(--muted);margin-top:12px}
.fav-x{color:var(--brand);background:none;border:0;cursor:pointer;padding:2px;flex:none;display:flex}
.fav-x .ic-svg{fill:currentColor}
/* popup richiesta (come 12a) */
.reqmodal .mhead{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line2)}
.reqmodal .rm-ava{width:40px;height:40px;border-radius:50%;overflow:hidden;flex:none;background:var(--panel2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.reqmodal .rm-ava img{width:100%;height:100%;object-fit:cover}
.reqmodal .rm-t{font:700 16px var(--f-display);display:flex;align-items:center;gap:6px}
.reqmodal .rm-s{font-size:12px;color:var(--muted)}
.reqmodal .mbody{padding:20px}
.avail{display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:10px;font-size:12.5px;background:#f1fbf5;border:1px solid #cbead6;color:#0a7d38}
.reqmodal .mfoot{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--line2)}
.reqmodal .mfoot .send{flex:1;justify-content:center;border-radius:10px}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<div id="pageContent" style="display:none">
  <div class="avz">
    <div class="avz-head">
      <div>
        <h1>Preferiti</h1>
        <div class="sub2" id="favSub">Le disponibilità dei tuoi artisti salvati. Clicca un giorno libero per richiederli.</div>
      </div>
      <div class="avz-nav">
        <span class="lbl" id="avzLbl"></span>
        <button id="avzPrev" onclick="nav(-1)">‹</button>
        <button onclick="nav(1)">›</button>
      </div>
    </div>
    <div class="avz-legend">
      <span><i style="background:#eafaf0;border:1px solid #bfe9cf"></i>Libero · clicca per richiedere</span>
      <span><i style="background:#fbeaef;border:1px solid #f3d3dd"></i>Occupato</span>
      <span><i style="background:#f2f2f2;border:1px solid #e5e5e5"></i>Calendario non collegato</span>
    </div>
    <div class="avz-box"><div class="avz-grid" id="avzGrid"></div></div>
    <div class="avz-hint" id="lockedNote" style="display:none"></div>
    <div id="favEmpty" class="empty" style="display:none">
      <span class="et">Non hai ancora preferiti</span>
      <a class="btn ghost sm" style="margin-top:10px" href="/">Sfoglia gli artisti</a> e tocca il cuore per salvarli qui.
    </div>
  </div>
</div>

<!-- POPUP RICHIESTA (12a, con data preselezionata dal click) -->
<div class="overlay" id="reqModal">
  <div class="modal reqmodal" style="max-width:480px;padding:0">
    <div class="mhead">
      <span class="rm-ava" id="rm_ava"></span>
      <div><div class="rm-t" id="rm_title"></div><div class="rm-s" id="rm_sub"></div></div>
      <button type="button" class="iconbtn" style="margin-left:auto" onclick="closeReq()">✕</button>
    </div>
    <div class="mbody">
      <div class="avail" id="rq_when"></div>
      <div class="field" style="margin:14px 0 0"><label>Link evento</label><input type="url" id="rq_link" placeholder="https://… (pagina o locandina)"></div>
      <div class="autocomplete field" style="margin:14px 0 0"><label>Comune</label><input id="rq_comune" placeholder="Es. Milano" autocomplete="off"></div>
      <div class="field" style="margin:14px 0 0"><label>Messaggio *</label><textarea id="rq_msg" placeholder="Racconta l'evento, il locale, gli orari…" style="min-height:76px"></textarea></div>
    </div>
    <div class="mfoot">
      <button type="button" class="btn ghost" onclick="closeReq()">Annulla</button>
      <button type="button" class="btn primary send" onclick="sendReq()">Invia richiesta</button>
    </div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
const MESI=['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
const MESI_L=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const GG=['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const NDAYS=16;
let FAV=[], OFFSET=0, LOCKED=false, REQ={artist:null, date:null};

function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function goArtist(slug){ if(slug) location.href='/'+slug; }
function nav(delta){ OFFSET=Math.max(0, OFFSET+delta*NDAYS); draw(); }

async function init(){
  const me=await getMe(true);
  if(!me.user){ location.href='/accedi.html'; return; }
  if(!['promoter','management','admin'].includes(me.user.role)){ location.href='/'; return; }
  if(me.user.role==='admin'){ await renderNav(); document.getElementById('pageContent').style.display=''; }
  else mountPromoterShell(me.user,'preferiti');
  injectIcons();
  await load();
}
async function load(){
  let r; try{ r=await api('favorites-list.php'); }catch(err){ toast(errMsg(err),true); return; }
  FAV=(r.artists||[]).map(a=>({...a,_busy:new Set(a.busy||[])}));
  LOCKED=!!r.locked;
  const note=document.getElementById('lockedNote');
  if(LOCKED && FAV.length){ note.style.display=''; note.textContent='I cachet saranno visibili dopo la verifica del tuo account da parte dello staff.'; }
  document.getElementById('favSub').textContent = FAV.length
    ? `${FAV.length} artist${FAV.length===1?'a salvato':'i salvati'} · clicca un giorno libero per richiederli`
    : 'Le disponibilità dei tuoi artisti salvati.';
  document.getElementById('favEmpty').style.display = FAV.length?'none':'block';
  document.querySelector('.avz-box').style.display = FAV.length?'':'none';
  document.querySelector('.avz-legend').style.display = FAV.length?'':'none';
  draw();
}

function priceOf(a){
  if(LOCKED) return '';
  const v=a.cachet_min??a.cachet_max;
  if(v==null||v===0) return '';
  return 'da '+eur(a.has_promo&&a.cachet_promo!=null?a.cachet_promo:v);
}

function draw(){
  if(!FAV.length) return;
  document.getElementById('avzPrev').disabled = OFFSET===0;
  const days=[]; const base=new Date(); base.setHours(0,0,0,0); base.setDate(base.getDate()+OFFSET);
  for(let i=0;i<NDAYS;i++){ const d=new Date(base); d.setDate(base.getDate()+i); days.push(d); }
  const todayIso=isoOf(new Date());
  document.getElementById('avzLbl').textContent =
    `${days[0].getDate()} ${MESI[days[0].getMonth()].toLowerCase()} – ${days[NDAYS-1].getDate()} ${MESI[days[NDAYS-1].getMonth()].toLowerCase()} ${days[NDAYS-1].getFullYear()}`;

  // intestazione: giorno settimana + "9 AGO"
  let html='<div></div>'+days.map(d=>{
    const iso=isoOf(d);
    return `<div class="avz-dow${iso===todayIso?' today':''}">${GG[d.getDay()]}<b>${d.getDate()}</b><span class="mo">${MESI[d.getMonth()]}</span></div>`;
  }).join('');

  FAV.forEach((a,ai)=>{
    const pic=a.photo_url?`<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer" alt="">`:esc(avatarInitials(a.stage_name||'A'));
    const meta=[a.comune, priceOf(a)].filter(Boolean).join(' · ');
    html+='<div class="avz-sep"></div>';
    html+=`<div class="avz-artist" title="Vedi profilo">
      <button class="fav-x" title="Rimuovi dai preferiti" onclick="event.stopPropagation();removeFav(${a.user_id})">${icon('heart',13,1.6)}</button>
      <span class="avz-ava" onclick="goArtist('${esc(a.slug||'')}')" style="background:${avatarColor(a.stage_name||'A')}">${pic}</span>
      <span style="min-width:0" onclick="goArtist('${esc(a.slug||'')}')"><span class="nm" style="display:block">${esc(a.stage_name||'Artista')}${a.verified?'<span class="vchk">✓</span>':''}</span><span class="mt" style="display:block">${esc(meta)}</span></span>
    </div>`;
    html+=days.map(d=>{
      const iso=isoOf(d);
      if(!a.has_calendar) return `<div class="avz-cell na" title="${esc(a.stage_name||'')} · calendario non collegato"></div>`;
      const b=a._busy.has(iso);
      if(b) return `<div class="avz-cell busy" title="${esc(a.stage_name||'')} · ${d.getDate()} ${MESI[d.getMonth()]} · occupato"></div>`;
      return `<div class="avz-cell" title="Richiedi ${esc(a.stage_name||'')} per il ${d.getDate()} ${MESI[d.getMonth()]}" onclick="openReq(${ai},'${iso}')"></div>`;
    }).join('');
  });

  document.getElementById('avzGrid').innerHTML=html;
}

async function removeFav(id){
  try{
    await api('favorites-toggle.php',{method:'POST',body:{artist_user_id:id,on:false}});
    FAV=FAV.filter(a=>a.user_id!==id);
    toast('Rimosso dai preferiti');
    document.getElementById('favSub').textContent = FAV.length?`${FAV.length} artist${FAV.length===1?'a salvato':'i salvati'} · clicca un giorno libero per richiederli`:'Le disponibilità dei tuoi artisti salvati.';
    document.getElementById('favEmpty').style.display = FAV.length?'none':'block';
    document.querySelector('.avz-box').style.display = FAV.length?'':'none';
    if(FAV.length) draw();
  }catch(err){ toast(errMsg(err),true); }
}

/* ---- popup richiesta con data preselezionata (12a) ---- */
function openReq(ai, iso){
  const a=FAV[ai]; if(!a) return;
  REQ={artist:a, date:iso};
  rm_ava.innerHTML = a.photo_url?`<img src="${esc(a.photo_url)}" referrerpolicy="no-referrer">`:esc(avatarInitials(a.stage_name));
  rm_ava.style.background = a.photo_url?'':avatarColor(a.stage_name);
  rm_title.innerHTML = 'Richiedi '+esc(a.stage_name)+(a.verified?'<span class="vchk">✓</span>':'');
  rm_sub.textContent = [showLabel(a.formazione), priceOf(a)?priceOf(a)+' a serata':''].filter(Boolean).join(' · ');
  const d=new Date(iso+'T00:00:00');
  rq_when.innerHTML = icon('check',15,2)+` ${d.toLocaleDateString('it-IT',{weekday:'long'})} <b style="margin:0 4px">${d.getDate()} ${MESI_L[d.getMonth()]} ${d.getFullYear()}</b> · risulta libero`;
  if(!window._rqAc){ window._rqAc=1; comuniAutocomplete(document.getElementById('rq_comune'), ()=>{}); }
  rq_link.value=''; rq_comune.value=''; rq_msg.value='';
  document.getElementById('reqModal').classList.add('open');
}
function closeReq(){ document.getElementById('reqModal').classList.remove('open'); }
async function sendReq(){
  const msg=(rq_msg.value||'').trim();
  if(!msg){ toast('Scrivi un messaggio',true); return; }
  try{
    await api('booking-request.php',{method:'POST',body:{
      artist_user_id:REQ.artist.user_id, event_date:REQ.date,
      event_link:(rq_link.value||'').trim()||null, comune:(rq_comune.value||'').trim()||null, message:msg}});
    toast('Richiesta inviata a '+(REQ.artist.stage_name||'artista')+'!');
    closeReq();
  }catch(err){ toast(errMsg(err),true); }
}
init();
</script>
</body>
</html>
