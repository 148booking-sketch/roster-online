<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reimposta password · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>

<div class="auth-bg">
  <!-- NUOVA PASSWORD (design 11d) -->
  <form class="auth-card" id="form" onsubmit="return doReset(event)">
    <div class="auth-icobox" data-ic="lock" data-ic-size="24" data-ic-stroke="1.7"></div>
    <h1 class="auth-title">Nuova password</h1>
    <div class="auth-sub">Scegli una password di almeno 8 caratteri</div>
    <div class="field"><label>Nuova password</label><input id="p1" type="password" minlength="8" required></div>
    <div class="field"><label>Conferma password</label><input id="p2" type="password" minlength="8" required></div>
    <button class="btn primary cta">Salva nuova password</button>
  </form>

  <div class="auth-card" id="badlink" style="display:none">
    <div class="auth-icobox" data-ic="x" data-ic-size="24" data-ic-stroke="1.7"></div>
    <h1 class="auth-title">Link non valido</h1>
    <div class="auth-sub">Il link è scaduto o non è valido. Richiedi di nuovo il recupero password.</div>
    <a class="btn primary cta" href="/accedi.html#recupera">Recupera password</a>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
renderNav().then(()=>injectIcons());
const token = new URLSearchParams(location.search).get('token') || '';
if (!token){ document.getElementById('form').style.display='none'; document.getElementById('badlink').style.display=''; }

async function doReset(e){ e.preventDefault();
  if (p1.value !== p2.value){ toast('Le due password non coincidono', true); return false; }
  try {
    await api('password-reset.php',{method:'POST',body:{ token, password: p1.value }});
    toast('Password reimpostata ✓');
    setTimeout(()=> location.href = '/accedi.html', 900);
  } catch(err){
    if (err.message === 'token_invalid_or_expired'){
      document.getElementById('form').style.display='none';
      document.getElementById('badlink').style.display='';
    }
    toast(errMsg(err), true);
  }
  return false;
}
</script>
</body>
</html>
