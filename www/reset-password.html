<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reimposta password · 148 Roster</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<nav class="nav" id="nav"></nav>

<main class="container" style="max-width:460px;padding-top:40px">
  <h1 class="title">Reimposta la password</h1>

  <form class="panel" id="form" onsubmit="return doReset(event)">
    <p class="sub" style="margin-top:0">Scegli una nuova password per il tuo account.</p>
    <div class="row">
      <div class="field"><label>Nuova password (min 8)</label><input id="p1" type="password" minlength="8" required></div>
    </div>
    <div class="field"><label>Ripeti password</label><input id="p2" type="password" minlength="8" required></div>
    <button class="btn primary" style="width:100%">Imposta nuova password</button>
  </form>

  <div class="panel" id="badlink" style="display:none">
    <p>Link non valido o scaduto. Richiedi di nuovo il recupero password.</p>
    <a class="btn dark" href="/accedi.html#recupera">Recupera password</a>
  </div>
</main>

<script src="/assets/api.js"></script>
<script>
renderNav();
const token = new URLSearchParams(location.search).get('token') || '';
if (!token){ document.getElementById('form').style.display='none'; document.getElementById('badlink').style.display=''; }

async function doReset(e){ e.preventDefault();
  if (p1.value !== p2.value){ toast('Le due password non coincidono', true); return false; }
  try {
    await api('password-reset.php',{method:'POST',body:{ token, password: p1.value }});
    toast('Password reimpostata ✓');
    setTimeout(()=> location.href = '/accedi.html', 900);
  } catch(err){
    if (err.message === 'token_invalid_or_expired'){
      document.getElementById('form').style.display='none';
      document.getElementById('badlink').style.display='';
    }
    toast(errMsg(err), true);
  }
  return false;
}
</script>
</body>
</html>
