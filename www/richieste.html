<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Richieste · Booking Roster</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
/* vista card (artista, design 6a) */
#cardList{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:14px;align-items:start}
@media(max-width:520px){#cardList{grid-template-columns:1fr}}
.rq-card{border:1px solid var(--line);border-radius:16px;padding:18px 20px;background:#fff;box-shadow:var(--shadow);border-left:5px solid var(--line)}
.rq-card.accettata{border-left-color:#0a7d38}
.rq-card.rifiutata{border-left-color:#c0395e}
.rq-card.inviata,.rq-card.vista{border-left-color:#2563eb}
.rq-card.ritirata{border-left-color:#92700f}
.rq-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.rq-who{display:flex;gap:12px;align-items:center;min-width:0}
.rq-ava{width:46px;height:46px;border-radius:12px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:none}
.rq-name{font-weight:700;font-size:17px;font-family:var(--f-display);line-height:1.2}
.rq-sent{font-size:12px;color:var(--muted);margin-top:3px}
.rq-badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap;flex:none}
.rq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.rq-box{border:1px solid var(--line);border-radius:12px;padding:10px 14px;background:var(--panel2)}
.rq-box-l{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:5px}
.rq-box-v{font-size:17px;font-weight:700;margin-top:3px;font-family:var(--f-display)}
.rq-box-v.money{color:#0a7d38}
.rq-msg{margin-top:14px;color:#444;background:var(--panel2);border-radius:10px;padding:11px 14px;position:relative}
.rq-msg::before{content:'“';font-size:26px;color:var(--muted);line-height:0;position:relative;top:6px;margin-right:2px}
.rq-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
@media(max-width:520px){.rq-grid{grid-template-columns:1fr}}
/* thread messaggi (condiviso card + tabella) */
.rq-thread{margin-top:14px;border-top:1px solid var(--line2);padding-top:12px}
.th-list{display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;padding-right:4px}
.th-msg{max-width:82%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.45;white-space:pre-line;word-break:break-word}
.th-msg .th-meta{display:block;font-size:11px;color:var(--muted);margin-top:3px}
.th-msg.other{align-self:flex-start;background:var(--panel2);border-bottom-left-radius:5px}
.th-msg.mine{align-self:flex-end;background:#1a1c22;color:#fff;border-bottom-right-radius:5px}
.th-msg.mine .th-meta{color:#9a9aa2}
.th-form{display:flex;gap:8px;margin-top:10px}
.th-form input{flex:1;min-width:0}
.th-form .btn{padding:11px 14px}
.th-empty{color:var(--muted);font-size:13px;text-align:center;padding:8px 0}
/* toolbar tabella promoter */
.rq-toolbar{display:flex;align-items:center;gap:12px}
.rq-toolbar .cta{margin-left:auto}
</style>
</head>
<body>
<nav class="nav" id="nav"></nav>

<div id="pageContent" style="display:none">
  <div class="pmain-pad" id="pagePad">
    <div class="rq-toolbar">
      <div>
        <h1 class="ptitle" id="pageTitle">Richieste</h1>
        <p class="psub" id="pageSub"></p>
      </div>
      <a class="btn primary sm cta" id="ctaSearch" href="/" style="display:none">Cerca artisti</a>
    </div>

    <!-- filtri stato (vista tabella) -->
    <div class="fpills" id="fpills" style="display:none"></div>

    <!-- vista tabella (promoter/agenzia, design 6b) -->
    <div class="rq-table" id="tableWrap" style="display:none">
      <div class="rqt-head"><div>Artista</div><div>Data evento</div><div>Compenso</div><div>Stato</div><div style="text-align:right">Azioni</div></div>
      <div id="tableRows"></div>
    </div>

    <!-- vista card (artista, design 6a) -->
    <div id="cardList"></div>

    <div id="empty" class="empty" style="display:none">Nessuna richiesta per ora.</div>
  </div>
</div>

<script src="/assets/api.js"></script>
<script>
let role, REQS=[], FILTER='all';
const RQST = {
  inviata:['Inviata','#2563eb','#eaf1fb'], vista:['Vista','#2563eb','#eaf1fb'],
  accettata:['Accettata','#0a7d38','#eafaf0'], rifiutata:['Rifiutata','#717171','#f2f2f2'], ritirata:['Ritirata','#92700f','#fff7e6']
};
const MESI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const GG=['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
function parseD(s){ return s ? new Date((''+s).replace(' ','T')) : null; }
function fmtLong(s){ const d=parseD(s); if(!d||isNaN(d)) return '—';
  return `${GG[d.getDay()]} ${d.getDate()} ${MESI[d.getMonth()]} ${d.getFullYear()}`; }
function fmtShort(s){ const d=parseD(s); if(!d||isNaN(d)) return '';
  return `${d.getDate()} ${MESI[d.getMonth()].slice(0,3)} ${d.getFullYear()}`; }
function fmtTime(s){ const d=parseD(s); if(!d||isNaN(d)) return '';
  return `${d.getDate()}/${d.getMonth()+1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

async function init(){
  const me = await getMe(true);
  if(!me.user){ location.href='/accedi.html'; return; }
  role = me.user.role;
  if(role==='promoter'||role==='management'){ mountPromoterShell(me.user,'richieste'); }
  else { await renderNav(); document.getElementById('pageContent').style.display=''; document.getElementById('pagePad').classList.remove('pmain-pad'); document.getElementById('pagePad').classList.add('container','section'); }
  pageTitle.textContent = role==='artist' ? 'Richieste ricevute' : 'Le mie richieste';
  load();
}
async function load(){
  const box = role==='artist' ? 'received' : 'sent';
  const r = await api('booking-request.php?box='+box);
  REQS = r.requests||[];
  if(role==='artist'){
    pageSub.textContent = 'I promoter che ti hanno contattato.';
    renderCards();
  } else {
    const pending=REQS.filter(x=>['inviata','vista'].includes(x.status)).length;
    pageSub.textContent = `${REQS.length} inviat${REQS.length===1?'a':'e'} · ${pending} in attesa di risposta`;
    document.getElementById('ctaSearch').style.display='';
    renderPills(); renderTable();
  }
  document.getElementById('empty').style.display = REQS.length?'none':'block';
}

/* ---- vista TABELLA (promoter/agenzia, 6b) ---- */
function renderPills(){
  const el=document.getElementById('fpills'); el.style.display='flex';
  const n=s=>REQS.filter(x=>s.includes(x.status)).length;
  const pills=[
    ['all','Tutte '+REQS.length,''],
    ['pending','In attesa '+n(['inviata','vista']),'warn'],
    ['accettata','Accettate '+n(['accettata']),'ok'],
    ['rifiutata','Rifiutate '+n(['rifiutata','ritirata']),''],
  ];
  el.innerHTML=pills.map(([k,l,extra])=>`<button class="fpill ${FILTER===k?'on':extra}" onclick="setFilter('${k}')">${l}</button>`).join('');
}
function setFilter(k){ FILTER=k; renderPills(); renderTable(); }
function filtered(){
  if(FILTER==='pending')   return REQS.filter(x=>['inviata','vista'].includes(x.status));
  if(FILTER==='accettata') return REQS.filter(x=>x.status==='accettata');
  if(FILTER==='rifiutata') return REQS.filter(x=>['rifiutata','ritirata'].includes(x.status));
  return REQS;
}
function renderTable(){
  document.getElementById('tableWrap').style.display='';
  const L=filtered();
  document.getElementById('tableRows').innerHTML = L.map(rq=>{
    const who=rq.stage_name||'Artista';
    const st=RQST[rq.status]||[rq.status,'#666','#f2f2f2'];
    const pending=['inviata','vista'].includes(rq.status);
    return `<div class="rqt-row" id="row-${rq.id}">
      <div class="rqt-who">
        <span class="avatar" style="background:${avatarColor(who)}">${esc(avatarInitials(who))}</span>
        <div style="min-width:0"><div class="nm">${esc(who)}</div><div class="mt">${rq.status==='vista'?'vista':'inviata'} ${fmtShort(rq.created_at)}</div></div>
      </div>
      <div style="font-size:13px;color:#444">${rq.event_date?fmtShort(rq.event_date):'Da concordare'}</div>
      <div style="font-size:13px;font-weight:600">${rq.proposed_fee!=null?eur(rq.proposed_fee):'—'}</div>
      <div><span class="rqt-st" style="color:${st[1]};background:${st[2]}">${st[0]}</span></div>
      <div class="rqt-actions">
        ${pending?`<button class="abtn danger" onclick="respond(${rq.id},'ritira')">Ritira</button>`:''}
        <button class="abtn" onclick="toggleThread(${rq.id})">${icon('message',13,1.9)} Messaggi</button>
      </div>
      <div class="rqt-thread rq-thread" id="th-${rq.id}" style="display:none">
        <div class="th-list" id="thList-${rq.id}"><div class="th-empty">Carico…</div></div>
        <form class="th-form" onsubmit="return sendMsg(event,${rq.id})">
          <input id="thInput-${rq.id}" placeholder="Scrivi un messaggio…" maxlength="2000" autocomplete="off">
          <button class="btn primary sm" title="Invia">${icon('send',16,2)}</button>
        </form>
      </div>
    </div>`;
  }).join('') || '<div class="empty" style="border:0">Nessuna richiesta con questo filtro.</div>';
}

/* ---- vista CARD (artista, 6a) ---- */
function renderCards(){
  document.getElementById('cardList').innerHTML = REQS.map(rq=>{
    const who = rq.org_name||rq.promoter_name||'Promoter';
    const st = RQST[rq.status] || [rq.status,'#666','#f2f2f2'];
    let actions='';
    if(['inviata','vista'].includes(rq.status)){
      actions = `
        <button class="btn primary sm" onclick="respond(${rq.id},'accetta')">${icon('check',15,2.2)} Accetta</button>
        <button class="btn ghost sm" onclick="respond(${rq.id},'rifiuta')">Rifiuta</button>`;
    }
    return `<div class="rq-card ${esc(rq.status)}">
      <div class="rq-top">
        <div class="rq-who">
          <span class="rq-ava" style="background:${avatarColor(who)}">${esc(avatarInitials(who))}</span>
          <div>
            <div class="rq-name">${esc(who)}</div>
            <div class="rq-sent">Richiesta del ${fmtShort(rq.created_at)}${rq.responded_at?` · risposta ${fmtShort(rq.responded_at)}`:''}</div>
          </div>
        </div>
        <span class="rq-badge" style="background:${st[2]};color:${st[1]}">${st[0]}</span>
      </div>
      <div class="rq-grid">
        <div class="rq-box"><div class="rq-box-l">${icon('calendar',13)} Data evento</div>
          <div class="rq-box-v">${rq.event_date?fmtLong(rq.event_date):'Da concordare'}</div></div>
        <div class="rq-box"><div class="rq-box-l">${icon('euro',13)} Offerta economica</div>
          <div class="rq-box-v money">${rq.proposed_fee!=null?eur(rq.proposed_fee):'Da concordare'}</div></div>
      </div>
      ${rq.message?`<div class="rq-msg">${esc(rq.message)}</div>`:''}
      <div class="rq-actions">
        ${actions}
        <button class="btn ghost sm" onclick="toggleThread(${rq.id})">${icon('message',15)} Messaggi</button>
      </div>
      <div class="rq-thread" id="th-${rq.id}" style="display:none">
        <div class="th-list" id="thList-${rq.id}"><div class="th-empty">Carico…</div></div>
        <form class="th-form" onsubmit="return sendMsg(event,${rq.id})">
          <input id="thInput-${rq.id}" placeholder="Scrivi un messaggio…" maxlength="2000" autocomplete="off">
          <button class="btn primary sm" title="Invia">${icon('send',16,2)}</button>
        </form>
      </div>
    </div>`;
  }).join('');
}

async function respond(id, action){
  try{ await api('booking-respond.php',{method:'POST',body:{request_id:id,action}}); toast('Fatto ✓'); load(); }
  catch(err){ toast(errMsg(err),true); }
}

/* ---- Thread messaggi ---- */
async function toggleThread(id){
  const box=document.getElementById('th-'+id);
  const open = box.style.display==='none';
  box.style.display = open?'':'none';
  if(open) loadThread(id);
}
async function loadThread(id){
  const el=document.getElementById('thList-'+id);
  try{
    const r=await api('booking-messages.php?request_id='+id);
    const M=r.messages||[];
    el.innerHTML = M.length ? M.map(m=>`
      <div class="th-msg ${m.mine?'mine':'other'}">${esc(m.body)}
        <span class="th-meta">${m.mine?'Tu':esc(m.sender_name||'')} · ${fmtTime(m.created_at)}</span>
      </div>`).join('') : '<div class="th-empty">Nessun messaggio: scrivi il primo!</div>';
    el.scrollTop = el.scrollHeight;
  }catch(err){ el.innerHTML='<div class="th-empty">'+esc(errMsg(err))+'</div>'; }
}
async function sendMsg(e, id){
  e.preventDefault();
  const inp=document.getElementById('thInput-'+id);
  const text=inp.value.trim();
  if(!text) return false;
  inp.disabled=true;
  try{
    await api('booking-messages.php',{method:'POST',body:{request_id:id, body:text}});
    inp.value='';
    await loadThread(id);
  }catch(err){ toast(errMsg(err),true); }
  inp.disabled=false; inp.focus();
  return false;
}
init();
</script>
</body>
</html>
